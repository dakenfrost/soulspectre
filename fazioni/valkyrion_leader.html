<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOULSPECTRE | The Ruler</title>
    <style>
        body {
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.8;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('../img/valkyrion_bg.jpeg'); 
            background-size: cover;
            background-position: center;
            z-index: -2;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, rgba(10, 10, 12, 0.90), rgba(5, 5, 5, 0.98)); 
            z-index: -1;
        }

        header {
            padding: 60px 20px 30px 20px;
            text-align: center;
            width: 100%;
            max-width: 1100px;
        }

        h1 {
            letter-spacing: 5px;
            font-size: 2.8rem;
            margin: 0;
            color: #fff;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(92, 156, 230, 0.5);
        }

        .subtitle {
            color: #5c9ce6;
            font-size: 1.1rem;
            letter-spacing: 2px;
            margin-top: 10px;
            text-transform: uppercase;
        }

        main {
            max-width: 1100px; 
            padding: 40px 20px;
            width: 100%;
            position: relative;
        }

        /* MODULO NARRATIVO (SPLIT LAYOUT) */
        .split-section {
            display: flex;
            gap: 40px;
            align-items: stretch; 
            margin-bottom: 60px; 
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.05);
            border-left: 3px solid #5c9ce6;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .section-image {
            flex: 0 0 45%; 
        }

        .section-image img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }

        .section-text {
            flex: 1; 
            padding: 35px;
        }

        h2 {
            color: #fff;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 1.8rem;
        }

        p {
            margin-bottom: 25px;
            color: #ccc;
            font-size: 1.1rem;
            text-align: justify;
        }

        strong {
            color: #5c9ce6;
        }

        /* CAROSELLO EXTRA */
        .portrait-gallery-module {
            margin-top: 20px;
            margin-bottom: 80px;
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.05);
            border-left: 3px solid #5c9ce6;
            padding: 35px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .gallery-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .gallery-header h2 {
            border: none;
            display: inline-block;
            font-size: 1.8rem;
            text-shadow: 0 0 15px rgba(92, 156, 230, 0.6);
            margin-bottom: 5px;
        }

        .carousel-container {
            position: relative;
            width: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .carousel-track {
            display: flex;
            gap: 15px;
            width: auto;
            transition: transform 0.3s ease;
        }

        .carousel-item {
            flex: 0 0 200px; /* Larghezza delle miniature nel carosello */
            height: 200px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            transition: border-color 0.3s ease, transform 0.3s ease;
        }

        .carousel-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .carousel-item:hover {
            border-color: #5c9ce6;
            transform: translateY(-5px);
        }

        .carousel-item:hover img {
            transform: scale(1.05);
        }

        .carousel-item.active {
            border-color: #5c9ce6;
            box-shadow: 0 0 10px rgba(92, 156, 230, 0.4);
        }

        .item-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0));
            color: #fff;
            font-size: 0.9rem;
            padding: 10px 5px 5px 5px;
            text-align: center;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(15,15,15,0.9);
            border: 1px solid #5c9ce6;
            color: #5c9ce6;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 3;
            transition: background 0.3s, color 0.3s;
            font-size: 1.5rem;
            line-height: 1;
        }

        .nav-arrow:hover {
            background: #5c9ce6;
            color: #fff;
        }

        .prev { left: 10px; }
        .next { right: 10px; }

        .carousel-indicators {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
        }

        .indicator-dot {
            width: 10px;
            height: 10px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.3s;
        }

        .indicator-dot.active {
            background: #5c9ce6;
            box-shadow: 0 0 5px #5c9ce6;
        }

        /* MODULO TATTICO: STATISTICHE E ABILITA' */
        .tactical-module {
            border-top: 2px solid #5c9ce6;
            padding-top: 40px;
        }

        .tactical-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .tactical-header h2 {
            border: none;
            display: inline-block;
            font-size: 2.2rem;
            text-shadow: 0 0 15px rgba(92, 156, 230, 0.6);
            margin-bottom: 5px;
        }

        .stats-box {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            background: linear-gradient(145deg, rgba(20,20,25,0.9), rgba(10,10,12,0.9));
            border: 1px solid rgba(92, 156, 230, 0.3);
            border-radius: 4px;
            padding: 25px;
            margin-bottom: 50px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 10px 20px rgba(0,0,0,0.5);
        }

        .stat-item {
            text-align: center;
            padding: 10px 20px;
        }

        .stat-label {
            display: block;
            color: #888;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .stat-value {
            display: block;
            color: #fff;
            font-size: 1.8rem;
            font-weight: bold;
            font-family: monospace;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        .stat-value.hp { color: #4CAF50; text-shadow: 0 0 10px rgba(76, 175, 80, 0.4); }
        .stat-value.atk { color: #f44336; text-shadow: 0 0 10px rgba(244, 67, 54, 0.4); }
        .stat-value.tier { color: #FFD700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.4); }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 25px;
        }

        .skill-card {
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid rgba(255,255,255,0.05);
            border-left: 4px solid #333;
            padding: 25px;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .skill-card:hover {
            transform: translateY(-5px);
            border-left-color: #5c9ce6;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .skill-card.ultimate {
            border-left-color: #FFD700; 
        }

        .skill-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
