<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#110d1a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#080e09" stop-opacity="1"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softer">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- bg -->
  <rect width="64" height="64" rx="10" fill="url(#bg)"/>
  <!-- texture organica leggera -->
  <ellipse cx="18" cy="16" rx="22" ry="18" fill="#ce93d8" opacity="0.04"/>
  <ellipse cx="48" cy="50" rx="20" ry="16" fill="#ce93d8" opacity="0.04"/>
    <!-- figura stilizzata con aura -->
  <circle cx="32" cy="18" r="6" fill="none" stroke="#ce93d8" stroke-width="1.5"/>
  <path d="M26 26 Q24 36 24 48" stroke="#ce93d8" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M38 26 Q40 36 40 48" stroke="#ce93d8" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M24 36 L40 36" stroke="#ce93d8" stroke-width="1.3" stroke-linecap="round"/>
  <circle cx="32" cy="32" r="14" fill="none" stroke="#ce93d8" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.5"/>
</svg>
