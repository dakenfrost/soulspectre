<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#110d1a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#080e09" stop-opacity="1"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softer">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- bg -->
  <rect width="64" height="64" rx="10" fill="url(#bg)"/>
  <!-- texture organica leggera -->
  <ellipse cx="18" cy="16" rx="22" ry="18" fill="#ce93d8" opacity="0.04"/>
  <ellipse cx="48" cy="50" rx="20" ry="16" fill="#ce93d8" opacity="0.04"/>
    <!-- mano con fiore corrotto -->
  <path d="M24 52 Q22 42 24 32 Q26 24 32 22 Q38 24 40 32 Q42 42 40 52" 
        fill="none" stroke="#ce93d8" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M28 30 Q32 24 36 30" fill="none" stroke="#e1b5e8" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M32 22 Q30 16 24 14 Q26 20 30 22" fill="#ce93d8" opacity="0.35"/>
  <path d="M32 22 Q34 16 40 14 Q38 20 34 22" fill="#ce93d8" opacity="0.35"/>
  <path d="M32 14 Q32 10 32 8" stroke="#ce93d8" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <circle cx="32" cy="7" r="2" fill="#e1b5e8" opacity="0.7"/>
  <line x1="26" y1="52" x2="38" y2="52" stroke="#ce93d8" stroke-width="1.5" stroke-linecap="round"/>
</svg>
