<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#161408" stop-opacity="1"/>
      <stop offset="100%" stop-color="#080e09" stop-opacity="1"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softer">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- bg -->
  <rect width="64" height="64" rx="10" fill="url(#bg)"/>
  <!-- texture organica leggera -->
  <ellipse cx="18" cy="16" rx="22" ry="18" fill="#d4a843" opacity="0.04"/>
  <ellipse cx="48" cy="50" rx="20" ry="16" fill="#d4a843" opacity="0.04"/>
    <!-- raggio concentrato -->
  <circle cx="32" cy="22" r="8" fill="none" stroke="#d4a843" stroke-width="1.5"/>
  <circle cx="32" cy="22" r="4" fill="#d4a843" opacity="0.6"/>
  <circle cx="32" cy="22" r="2" fill="#e8c96a"/>
  <path d="M28 30 L24 52" stroke="#d4a843" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <path d="M32 30 L32 52" stroke="#e8c96a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M36 30 L40 52" stroke="#d4a843" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
</svg>
