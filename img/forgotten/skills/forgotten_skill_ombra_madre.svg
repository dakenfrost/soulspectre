<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#110d1a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#080e09" stop-opacity="1"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softer">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- bg -->
  <rect width="64" height="64" rx="10" fill="url(#bg)"/>
  <!-- texture organica leggera -->
  <ellipse cx="18" cy="16" rx="22" ry="18" fill="#ce93d8" opacity="0.04"/>
  <ellipse cx="48" cy="50" rx="20" ry="16" fill="#ce93d8" opacity="0.04"/>
    <!-- forma materna con aureola spezzata -->
  <path d="M32 12 Q44 16 46 28 Q48 42 32 52 Q16 42 18 28 Q20 16 32 12Z"
        fill="none" stroke="#ce93d8" stroke-width="1.8"/>
  <ellipse cx="32" cy="32" rx="8" ry="12" fill="#ce93d8" opacity="0.12"/>
  <circle cx="32" cy="22" r="5" fill="none" stroke="#ce93d8" stroke-width="1.2"/>
  <line x1="26" y1="18" x2="22" y2="13" stroke="#e1b5e8" stroke-width="1" opacity="0.7"/>
  <line x1="38" y1="18" x2="42" y2="13" stroke="#e1b5e8" stroke-width="1" opacity="0.7"/>
  <path d="M26 34 Q29 38 32 40 Q35 38 38 34" fill="none" stroke="#e1b5e8" stroke-width="1.3"/>
</svg>
