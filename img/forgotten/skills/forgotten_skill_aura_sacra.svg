  <path d="M32 16 Q36 24 32 28 Q28 24 32 16Z" fill="#d4a843" opacity="0.5"/>
  <path d="M32 36 Q36 40 32 48 Q28 40 32 36Z" fill="#d4a843" opacity="0.5"/>
  <path d="M16 32 Q24 28 28 32 Q24 36 16 32Z" fill="#d4a843" opacity="0.5"/>
  <path d="M36 32 Q40 28 48 32 Q40 36 36 32Z" fill="#d4a843" opacity="0.5"/>
  <circle cx="32" cy="32" r="6" fill="#d4a843" opacity="0.4"/>
  <circle cx="32" cy="32" r="2.5" fill="#e8c96a"/>
</svg>
