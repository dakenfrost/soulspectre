<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#161408" stop-opacity="1"/>
      <stop offset="100%" stop-color="#080e09" stop-opacity="1"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softer">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- bg -->
  <rect width="64" height="64" rx="10" fill="url(#bg)"/>
  <!-- texture organica leggera -->
  <ellipse cx="18" cy="16" rx="22" ry="18" fill="#d4a843" opacity="0.04"/>
  <ellipse cx="48" cy="50" rx="20" ry="16" fill="#d4a843" opacity="0.04"/>
    <!-- sole con spada verticale -->
  <circle cx="32" cy="32" r="12" fill="none" stroke="#d4a843" stroke-width="1.4"/>
  <line x1="32" y1="10" x2="32" y2="54" stroke="#d4a843" stroke-width="2" stroke-linecap="round"/>
  <line x1="26" y1="18" x2="38" y2="18" stroke="#d4a843" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="32" cy="32" r="5" fill="#d4a843" opacity="0.4"/>
  <circle cx="32" cy="32" r="2.5" fill="#e8c96a"/>
</svg>
