<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#0e1210" stop-opacity="1"/>
      <stop offset="100%" stop-color="#080e09" stop-opacity="1"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softer">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- bg -->
  <rect width="64" height="64" rx="10" fill="url(#bg)"/>
  <!-- texture organica leggera -->
  <ellipse cx="18" cy="16" rx="22" ry="18" fill="#9ab0a8" opacity="0.04"/>
  <ellipse cx="48" cy="50" rx="20" ry="16" fill="#9ab0a8" opacity="0.04"/>
    <circle cx="32" cy="32" r="16" fill="none" stroke="#9ab0a8" stroke-width="1.5"/>
  <line x1="16" y1="32" x2="48" y2="32" stroke="#c4d4ce" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="16" y1="24" x2="16" y2="40" stroke="#c4d4ce" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M16 24 Q12 32 16 40" fill="none" stroke="#9ab0a8" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
</svg>
