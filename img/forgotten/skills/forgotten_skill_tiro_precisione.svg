<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#080f18" stop-opacity="1"/>
      <stop offset="100%" stop-color="#080e09" stop-opacity="1"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softer">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- bg -->
  <rect width="64" height="64" rx="10" fill="url(#bg)"/>
  <!-- texture organica leggera -->
  <ellipse cx="18" cy="16" rx="22" ry="18" fill="#5ec4d4" opacity="0.04"/>
  <ellipse cx="48" cy="50" rx="20" ry="16" fill="#5ec4d4" opacity="0.04"/>
    <circle cx="32" cy="32" r="14" fill="none" stroke="#5ec4d4" stroke-width="1.5"/>
  <path d="M14 50 Q26 36 48 14" stroke="#5ec4d4" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="32" cy="32" r="3.5" fill="#5ec4d4" opacity="0.5"/>
  <circle cx="32" cy="32" r="1.5" fill="#e8c96a"/>
</svg>
