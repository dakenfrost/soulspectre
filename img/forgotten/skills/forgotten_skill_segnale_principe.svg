<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#110d1a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#080e09" stop-opacity="1"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softer">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- bg -->
  <rect width="64" height="64" rx="10" fill="url(#bg)"/>
  <!-- texture organica leggera -->
  <ellipse cx="18" cy="16" rx="22" ry="18" fill="#ce93d8" opacity="0.04"/>
  <ellipse cx="48" cy="50" rx="20" ry="16" fill="#ce93d8" opacity="0.04"/>
    <!-- corona stilizzata -->
  <path d="M16 46 L16 28 L24 36 L32 20 L40 36 L48 28 L48 46Z"
        fill="none" stroke="#ce93d8" stroke-width="1.8" stroke-linejoin="round"/>
  <line x1="16" y1="46" x2="48" y2="46" stroke="#ce93d8" stroke-width="2" stroke-linecap="round"/>
  <circle cx="16" cy="28" r="2" fill="#e1b5e8"/>
  <circle cx="48" cy="28" r="2" fill="#e1b5e8"/>
  <circle cx="32" cy="20" r="2.5" fill="#e1b5e8"/>
</svg>
