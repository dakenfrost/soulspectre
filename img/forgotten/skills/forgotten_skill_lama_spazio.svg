<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#110d1a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#080e09" stop-opacity="1"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softer">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- bg -->
  <rect width="64" height="64" rx="10" fill="url(#bg)"/>
  <!-- texture organica leggera -->
  <ellipse cx="18" cy="16" rx="22" ry="18" fill="#ce93d8" opacity="0.04"/>
  <ellipse cx="48" cy="50" rx="20" ry="16" fill="#ce93d8" opacity="0.04"/>
    <!-- lama curva eterea -->
  <path d="M16 50 Q24 38 32 28 Q40 18 50 14" stroke="#ce93d8" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M18 46 Q26 36 34 28" stroke="#e1b5e8" stroke-width="0.9" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M14 44 L22 52" stroke="#ce93d8" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M46 12 L54 20" stroke="#ce93d8" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="32" cy="30" r="3.5" fill="none" stroke="#ce93d8" stroke-width="1"/>
</svg>
