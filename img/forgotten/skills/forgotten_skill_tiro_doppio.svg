<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#080f18" stop-opacity="1"/>
      <stop offset="100%" stop-color="#080e09" stop-opacity="1"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softer">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- bg -->
  <rect width="64" height="64" rx="10" fill="url(#bg)"/>
  <!-- texture organica leggera -->
  <ellipse cx="18" cy="16" rx="22" ry="18" fill="#5ec4d4" opacity="0.04"/>
  <ellipse cx="48" cy="50" rx="20" ry="16" fill="#5ec4d4" opacity="0.04"/>
    <line x1="12" y1="26" x2="52" y2="26" stroke="#5ec4d4" stroke-width="2" stroke-linecap="round"/>
  <line x1="12" y1="38" x2="52" y2="38" stroke="#5ec4d4" stroke-width="2" stroke-linecap="round"/>
  <path d="M46 18 L56 26 L46 34" fill="none" stroke="#5ec4d4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M46 30 L56 38 L46 46" fill="none" stroke="#5ec4d4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
</svg>
