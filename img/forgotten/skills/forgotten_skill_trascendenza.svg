<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#161408" stop-opacity="1"/>
      <stop offset="100%" stop-color="#080e09" stop-opacity="1"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softer">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- bg -->
  <rect width="64" height="64" rx="10" fill="url(#bg)"/>
  <!-- texture organica leggera -->
  <ellipse cx="18" cy="16" rx="22" ry="18" fill="#d4a843" opacity="0.04"/>
  <ellipse cx="48" cy="50" rx="20" ry="16" fill="#d4a843" opacity="0.04"/>
    <!-- forma in ascesa con luce -->
  <path d="M32 52 L28 40 L20 38 L28 34 L26 22 L32 28 L38 22 L36 34 L44 38 L36 40Z"
        fill="none" stroke="#d4a843" stroke-width="1.6" stroke-linejoin="round"/>
  <path d="M32 28 L32 12" stroke="#e8c96a" stroke-width="2" stroke-linecap="round"/>
  <circle cx="32" cy="10" r="3" fill="#e8c96a" opacity="0.8"/>
  <circle cx="32" cy="32" r="5" fill="#d4a843" opacity="0.35"/>
</svg>
