<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#110d1a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#080e09" stop-opacity="1"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softer">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- bg -->
  <rect width="64" height="64" rx="10" fill="url(#bg)"/>
  <!-- texture organica leggera -->
  <ellipse cx="18" cy="16" rx="22" ry="18" fill="#ce93d8" opacity="0.04"/>
  <ellipse cx="48" cy="50" rx="20" ry="16" fill="#ce93d8" opacity="0.04"/>
    <circle cx="22" cy="20" r="5.5" fill="none" stroke="#ce93d8" stroke-width="1.5"/>
  <circle cx="42" cy="20" r="5.5" fill="none" stroke="#ce93d8" stroke-width="1.5"/>
  <circle cx="32" cy="44" r="5.5" fill="none" stroke="#ce93d8" stroke-width="1.5"/>
  <line x1="27" y1="20" x2="37" y2="20" stroke="#ce93d8" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="25" y1="25" x2="30" y2="39" stroke="#ce93d8" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="39" y1="25" x2="34" y2="39" stroke="#ce93d8" stroke-width="1.3" stroke-linecap="round"/>
  <circle cx="32" cy="32" r="4" fill="#ce93d8" opacity="0.25"/>
  <circle cx="32" cy="32" r="1.5" fill="#e1b5e8" opacity="0.7"/>
</svg>
