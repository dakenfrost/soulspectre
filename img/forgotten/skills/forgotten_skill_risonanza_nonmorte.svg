<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#110d1a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#080e09" stop-opacity="1"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softer">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- bg -->
  <rect width="64" height="64" rx="10" fill="url(#bg)"/>
  <!-- texture organica leggera -->
  <ellipse cx="18" cy="16" rx="22" ry="18" fill="#ce93d8" opacity="0.04"/>
  <ellipse cx="48" cy="50" rx="20" ry="16" fill="#ce93d8" opacity="0.04"/>
    <!-- onde concentriche spezzate -->
  <circle cx="32" cy="32" r="6" fill="none" stroke="#ce93d8" stroke-width="1.5"/>
  <path d="M20 20 Q18 26 18 32 Q18 38 20 44" fill="none" stroke="#ce93d8" stroke-width="1.3" stroke-linecap="round" opacity="0.7"/>
  <path d="M44 20 Q46 26 46 32 Q46 38 44 44" fill="none" stroke="#ce93d8" stroke-width="1.3" stroke-linecap="round" opacity="0.7"/>
  <path d="M14 16 Q12 24 12 32 Q12 40 14 48" fill="none" stroke="#ce93d8" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <path d="M50 16 Q52 24 52 32 Q52 40 50 48" fill="none" stroke="#ce93d8" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <circle cx="32" cy="32" r="2.5" fill="#e1b5e8"/>
</svg>
