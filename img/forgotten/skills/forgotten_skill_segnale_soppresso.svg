<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#110d1a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#080e09" stop-opacity="1"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softer">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- bg -->
  <rect width="64" height="64" rx="10" fill="url(#bg)"/>
  <!-- texture organica leggera -->
  <ellipse cx="18" cy="16" rx="22" ry="18" fill="#ce93d8" opacity="0.04"/>
  <ellipse cx="48" cy="50" rx="20" ry="16" fill="#ce93d8" opacity="0.04"/>
    <!-- occhio sbarrato -->
  <path d="M12 32 Q22 20 32 18 Q42 20 52 32 Q42 44 32 46 Q22 44 12 32Z"
        fill="none" stroke="#ce93d8" stroke-width="1.5"/>
  <ellipse cx="32" cy="32" rx="6" ry="9" fill="none" stroke="#ce93d8" stroke-width="1.2"/>
  <circle cx="32" cy="32" r="3" fill="#ce93d8" opacity="0.5"/>
  <line x1="14" y1="16" x2="50" y2="48" stroke="#ce93d8" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
</svg>
