<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#0d1e12" stop-opacity="1"/>
      <stop offset="100%" stop-color="#080e09" stop-opacity="1"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softer">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- bg -->
  <rect width="64" height="64" rx="10" fill="url(#bg)"/>
  <!-- texture organica leggera -->
  <ellipse cx="18" cy="16" rx="22" ry="18" fill="#5cb88a" opacity="0.04"/>
  <ellipse cx="48" cy="50" rx="20" ry="16" fill="#5cb88a" opacity="0.04"/>
    <!-- germoglio che sboccia -->
  <path d="M32 52 L32 34" stroke="#5cb88a" stroke-width="2" stroke-linecap="round"/>
  <path d="M32 44 Q24 40 20 30 Q28 28 32 36" fill="#5cb88a" opacity="0.45"/>
  <path d="M32 38 Q40 34 44 24 Q36 22 32 30" fill="#5cb88a" opacity="0.45"/>
  <path d="M32 34 Q26 28 26 20 Q32 16 34 24" fill="#8fd5b0" opacity="0.5"/>
  <ellipse cx="32" cy="53" rx="7" ry="2.5" fill="#5cb88a" opacity="0.25"/>
  <circle cx="32" cy="16" r="3.5" fill="#8fd5b0" opacity="0.8"/>
</svg>
