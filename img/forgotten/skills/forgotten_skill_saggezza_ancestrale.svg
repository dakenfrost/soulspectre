<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#0d1e12" stop-opacity="1"/>
      <stop offset="100%" stop-color="#080e09" stop-opacity="1"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softer">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- bg -->
  <rect width="64" height="64" rx="10" fill="url(#bg)"/>
  <!-- texture organica leggera -->
  <ellipse cx="18" cy="16" rx="22" ry="18" fill="#5cb88a" opacity="0.04"/>
  <ellipse cx="48" cy="50" rx="20" ry="16" fill="#5cb88a" opacity="0.04"/>
    <!-- occhio dentro una foglia -->
  <path d="M12 32 Q22 18 32 16 Q42 18 52 32 Q42 46 32 48 Q22 46 12 32Z"
        fill="none" stroke="#5cb88a" stroke-width="1.8"/>
  <ellipse cx="32" cy="32" rx="7" ry="10" fill="none" stroke="#8fd5b0" stroke-width="1.2"/>
  <ellipse cx="32" cy="32" rx="3.5" ry="5" fill="#8fd5b0" opacity="0.7"/>
  <circle cx="32" cy="32" r="1.5" fill="#fff" opacity="0.6"/>
  <line x1="32" y1="16" x2="32" y2="10" stroke="#5cb88a" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M28 10 Q32 8 36 10" fill="none" stroke="#5cb88a" stroke-width="1" stroke-linecap="round"/>
</svg>
