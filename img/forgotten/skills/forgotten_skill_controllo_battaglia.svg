<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#0e1210" stop-opacity="1"/>
      <stop offset="100%" stop-color="#080e09" stop-opacity="1"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softer">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- bg -->
  <rect width="64" height="64" rx="10" fill="url(#bg)"/>
  <!-- texture organica leggera -->
  <ellipse cx="18" cy="16" rx="22" ry="18" fill="#9ab0a8" opacity="0.04"/>
  <ellipse cx="48" cy="50" rx="20" ry="16" fill="#9ab0a8" opacity="0.04"/>
    <rect x="12" y="12" width="40" height="40" rx="5" fill="none" stroke="#9ab0a8" stroke-width="1.5"/>
  <circle cx="22" cy="22" r="4" fill="#9ab0a8" opacity="0.5"/>
  <circle cx="42" cy="22" r="4" fill="#9ab0a8" opacity="0.5"/>
  <circle cx="22" cy="42" r="4" fill="#9ab0a8" opacity="0.5"/>
  <circle cx="42" cy="42" r="4" fill="#9ab0a8" opacity="0.5"/>
