<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#110d1a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#080e09" stop-opacity="1"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softer">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- bg -->
  <rect width="64" height="64" rx="10" fill="url(#bg)"/>
  <!-- texture organica leggera -->
  <ellipse cx="18" cy="16" rx="22" ry="18" fill="#ce93d8" opacity="0.04"/>
  <ellipse cx="48" cy="50" rx="20" ry="16" fill="#ce93d8" opacity="0.04"/>
    <!-- scudo con nodo di pace -->
  <path d="M32 11 L50 20 L50 38 Q50 52 32 56 Q14 52 14 38 L14 20Z"
        fill="none" stroke="#ce93d8" stroke-width="1.8"/>
  <path d="M32 11 L48 20 L48 37 Q48 50 32 54 Q16 50 16 37 L16 20Z"
        fill="#ce93d8" opacity="0.07"/>
  <circle cx="32" cy="35" r="10" fill="none" stroke="#e1b5e8" stroke-width="1.2"/>
  <line x1="32" y1="25" x2="32" y2="22" stroke="#e1b5e8" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M27 30 Q32 26 37 30 Q39 35 32 40 Q25 35 27 30Z" fill="#ce93d8" opacity="0.3"/>
</svg>
