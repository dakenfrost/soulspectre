<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#161408" stop-opacity="1"/>
      <stop offset="100%" stop-color="#080e09" stop-opacity="1"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softer">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- bg -->
  <rect width="64" height="64" rx="10" fill="url(#bg)"/>
  <!-- texture organica leggera -->
  <ellipse cx="18" cy="16" rx="22" ry="18" fill="#d4a843" opacity="0.04"/>
  <ellipse cx="48" cy="50" rx="20" ry="16" fill="#d4a843" opacity="0.04"/>
    <!-- goccia con croce -->
  <path d="M32 14 Q44 24 44 38 Q44 52 32 54 Q20 52 20 38 Q20 24 32 14Z"
        fill="none" stroke="#d4a843" stroke-width="1.8"/>
  <path d="M32 14 Q38 24 38 36 Q38 46 32 50 Q26 46 26 36 Q26 24 32 14Z"
        fill="#d4a843" opacity="0.1"/>
  <line x1="32" y1="28" x2="32" y2="46" stroke="#e8c96a" stroke-width="2" stroke-linecap="round"/>
  <line x1="25" y1="36" x2="39" y2="36" stroke="#e8c96a" stroke-width="2" stroke-linecap="round"/>
</svg>
