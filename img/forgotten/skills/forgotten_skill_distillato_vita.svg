        fill="none" stroke="#5cb88a" stroke-width="1.8" stroke-linejoin="round"/>
  <line x1="24" y1="14" x2="40" y2="14" stroke="#d4a843" stroke-width="2" stroke-linecap="round"/>
  <path d="M26 38 Q32 28 38 38 Q35 48 32 50 Q29 48 26 38Z" fill="#5cb88a" opacity="0.4"/>
  <path d="M26 38 Q32 28 38 38 Q35 48 32 50 Q29 48 26 38Z" fill="none" stroke="#8fd5b0" stroke-width="1"/>
  <line x1="32" y1="28" x2="32" y2="22" stroke="#8fd5b0" stroke-width="1.2" stroke-linecap="round"/>
</svg>
