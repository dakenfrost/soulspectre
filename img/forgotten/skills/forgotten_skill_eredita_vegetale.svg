<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#0d1e12" stop-opacity="1"/>
      <stop offset="100%" stop-color="#080e09" stop-opacity="1"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softer">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- bg -->
  <rect width="64" height="64" rx="10" fill="url(#bg)"/>
  <!-- texture organica leggera -->
  <ellipse cx="18" cy="16" rx="22" ry="18" fill="#5cb88a" opacity="0.04"/>
  <ellipse cx="48" cy="50" rx="20" ry="16" fill="#5cb88a" opacity="0.04"/>
    <!-- ramo con radici -->
  <path d="M32 52 L32 24" stroke="#5cb88a" stroke-width="2" stroke-linecap="round"/>
  <path d="M32 40 Q24 34 18 22" stroke="#5cb88a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M32 32 Q40 26 46 14" stroke="#5cb88a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M32 48 Q26 50 22 56" stroke="#5cb88a" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M32 48 Q38 50 42 56" stroke="#5cb88a" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.7"/>
  <ellipse cx="18" cy="20" rx="5" ry="3.5" fill="#5cb88a" opacity="0.5" transform="rotate(-30 18 20)"/>
  <ellipse cx="46" cy="13" rx="5" ry="3.5" fill="#5cb88a" opacity="0.5" transform="rotate(20 46 13)"/>
</svg>
