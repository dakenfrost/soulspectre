<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#161408" stop-opacity="1"/>
      <stop offset="100%" stop-color="#080e09" stop-opacity="1"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softer">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- bg -->
  <rect width="64" height="64" rx="10" fill="url(#bg)"/>
  <!-- texture organica leggera -->
  <ellipse cx="18" cy="16" rx="22" ry="18" fill="#d4a843" opacity="0.04"/>
  <ellipse cx="48" cy="50" rx="20" ry="16" fill="#d4a843" opacity="0.04"/>
    <!-- mano dall'alto con raggio -->
  <path d="M26 18 Q24 12 26 8 Q30 10 30 16 Q32 10 34 8 Q36 12 34 18 Q38 12 40 8 Q43 12 40 18"
        fill="none" stroke="#d4a843" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M24 18 Q20 22 20 28 Q20 32 32 32 Q44 32 44 28 Q44 22 40 18Z"
        fill="none" stroke="#d4a843" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M26 32 L24 52" stroke="#e8c96a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M32 32 L32 52" stroke="#e8c96a" stroke-width="2" stroke-linecap="round"/>
  <path d="M38 32 L40 52" stroke="#e8c96a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M22 44 L42 44" stroke="#d4a843" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
</svg>
