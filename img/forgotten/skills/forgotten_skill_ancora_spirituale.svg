<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#110d1a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#080e09" stop-opacity="1"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softer">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- bg -->
  <rect width="64" height="64" rx="10" fill="url(#bg)"/>
  <!-- texture organica leggera -->
  <ellipse cx="18" cy="16" rx="22" ry="18" fill="#ce93d8" opacity="0.04"/>
  <ellipse cx="48" cy="50" rx="20" ry="16" fill="#ce93d8" opacity="0.04"/>
    <!-- ancora con vite rampicante -->
  <path d="M32 14 Q26 14 22 18 Q18 22 20 28 Q22 32 26 34 L26 50 L22 52 L42 52 L38 50 L38 34 Q42 32 44 28 Q46 22 42 18 Q38 14 32 14Z"
        fill="none" stroke="#ce93d8" stroke-width="1.6" stroke-linejoin="round"/>
  <circle cx="32" cy="22" r="5" fill="none" stroke="#ce93d8" stroke-width="1.3"/>
  <path d="M18 40 Q22 36 26 40" fill="none" stroke="#5cb88a" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M38 40 Q42 36 46 40" fill="none" stroke="#5cb88a" stroke-width="1.2" stroke-linecap="round"/>
</svg>
