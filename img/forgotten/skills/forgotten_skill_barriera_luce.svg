<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#161408" stop-opacity="1"/>
      <stop offset="100%" stop-color="#080e09" stop-opacity="1"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softer">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- bg -->
  <rect width="64" height="64" rx="10" fill="url(#bg)"/>
  <!-- texture organica leggera -->
  <ellipse cx="18" cy="16" rx="22" ry="18" fill="#d4a843" opacity="0.04"/>
  <ellipse cx="48" cy="50" rx="20" ry="16" fill="#d4a843" opacity="0.04"/>
    <!-- scudo esagonale luminoso -->
  <path d="M32 11 L50 21 L50 43 Q50 54 32 57 Q14 54 14 43 L14 21Z"
        fill="none" stroke="#d4a843" stroke-width="1.8"/>
  <path d="M32 18 L46 26 L46 41 Q46 50 32 53 Q18 50 18 41 L18 26Z"
        fill="#d4a843" opacity="0.08"/>
  <circle cx="32" cy="36" r="8" fill="none" stroke="#e8c96a" stroke-width="1" opacity="0.7"/>
  <path d="M27 33 L30 36 L38 26" stroke="#e8c96a" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
