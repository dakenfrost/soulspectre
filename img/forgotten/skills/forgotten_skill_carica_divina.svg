<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#161408" stop-opacity="1"/>
      <stop offset="100%" stop-color="#080e09" stop-opacity="1"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softer">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- bg -->
  <rect width="64" height="64" rx="10" fill="url(#bg)"/>
  <!-- texture organica leggera -->
  <ellipse cx="18" cy="16" rx="22" ry="18" fill="#d4a843" opacity="0.04"/>
  <ellipse cx="48" cy="50" rx="20" ry="16" fill="#d4a843" opacity="0.04"/>
    <!-- fulmine organico -->
  <path d="M22 10 L36 30 L28 30 L42 54 L28 34 L36 34Z"
        fill="#d4a843" opacity="0.85" stroke="#e8c96a" stroke-width="0.5"/>
  <ellipse cx="34" cy="32" rx="14" ry="10" fill="none" stroke="#d4a843" stroke-width="0.8" opacity="0.3" transform="rotate(-20 34 32)"/>
</svg>
