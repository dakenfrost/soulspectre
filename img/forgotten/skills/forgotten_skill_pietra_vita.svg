<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#0d1e12" stop-opacity="1"/>
      <stop offset="100%" stop-color="#080e09" stop-opacity="1"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softer">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- bg -->
  <rect width="64" height="64" rx="10" fill="url(#bg)"/>
  <!-- texture organica leggera -->
  <ellipse cx="18" cy="16" rx="22" ry="18" fill="#5cb88a" opacity="0.04"/>
  <ellipse cx="48" cy="50" rx="20" ry="16" fill="#5cb88a" opacity="0.04"/>
    <!-- gemma esagonale con vene -->
  <polygon points="32,13 44,20 44,44 32,51 20,44 20,20" fill="none" stroke="#5cb88a" stroke-width="1.8"/>
  <polygon points="32,19 40,24 40,40 32,45 24,40 24,24" fill="#5cb88a" opacity="0.12"/>
  <line x1="32" y1="19" x2="32" y2="45" stroke="#5cb88a" stroke-width="0.8" opacity="0.5"/>
  <line x1="20" y1="32" x2="44" y2="32" stroke="#5cb88a" stroke-width="0.8" opacity="0.5"/>
  <circle cx="32" cy="32" r="5" fill="#8fd5b0" opacity="0.6"/>
  <circle cx="32" cy="32" r="2.5" fill="#fff" opacity="0.3"/>
</svg>
