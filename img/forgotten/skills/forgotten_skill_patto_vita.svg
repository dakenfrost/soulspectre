<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#110d1a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#080e09" stop-opacity="1"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softer">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- bg -->
  <rect width="64" height="64" rx="10" fill="url(#bg)"/>
  <!-- texture organica leggera -->
  <ellipse cx="18" cy="16" rx="22" ry="18" fill="#ce93d8" opacity="0.04"/>
  <ellipse cx="48" cy="50" rx="20" ry="16" fill="#ce93d8" opacity="0.04"/>
    <!-- due fiamme che si toccano -->
  <path d="M22 48 Q18 36 20 26 Q22 16 26 12 Q26 22 28 28 Q30 22 30 14 Q34 20 34 30 Q36 22 40 14 Q42 24 40 34 Q44 40 42 48Z"
        fill="none" stroke="#ce93d8" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M24 44 Q28 36 32 32 Q36 36 40 44" fill="#ce93d8" opacity="0.2"/>
  <circle cx="32" cy="48" r="3" fill="#e1b5e8" opacity="0.6"/>
  <path d="M22 48 Q32 50 42 48" stroke="#ce93d8" stroke-width="1.2" fill="none" stroke-linecap="round"/>
</svg>
