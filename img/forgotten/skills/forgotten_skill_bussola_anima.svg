  <path d="M49 32 L36 34 L38 32 L36 30Z" fill="#ce93d8" opacity="0.6"/>
  <circle cx="32" cy="32" r="8" fill="none" stroke="#ce93d8" stroke-width="0.7" opacity="0.4"/>
</svg>
