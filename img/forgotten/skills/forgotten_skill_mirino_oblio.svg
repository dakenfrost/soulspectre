<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#110d1a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#080e09" stop-opacity="1"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softer">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- bg -->
  <rect width="64" height="64" rx="10" fill="url(#bg)"/>
  <!-- texture organica leggera -->
  <ellipse cx="18" cy="16" rx="22" ry="18" fill="#ce93d8" opacity="0.04"/>
  <ellipse cx="48" cy="50" rx="20" ry="16" fill="#ce93d8" opacity="0.04"/>
    <circle cx="32" cy="32" r="17" fill="none" stroke="#ce93d8" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="10" fill="none" stroke="#ce93d8" stroke-width="1" opacity="0.6"/>
  <circle cx="32" cy="32" r="3" fill="#ce93d8" opacity="0.5"/>
  <line x1="32" y1="10" x2="32" y2="16" stroke="#ce93d8" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="48" x2="32" y2="54" stroke="#ce93d8" stroke-width="2" stroke-linecap="round"/>
  <line x1="10" y1="32" x2="16" y2="32" stroke="#ce93d8" stroke-width="2" stroke-linecap="round"/>
  <line x1="48" y1="32" x2="54" y2="32" stroke="#ce93d8" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="18" x2="46" y2="46" stroke="#ce93d8" stroke-width="0.8" opacity="0.3"/>
</svg>
