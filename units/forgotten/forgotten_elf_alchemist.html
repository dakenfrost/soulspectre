      "The Elf Alchemist remembers the cathedral. Not its name, not its city , but the quality of the light inside it: amber, warm, falling through ancient stone in columns so thick they felt solid. She remembers holding a crystal up to that light for the first time and feeling something <strong>answer back from within it.</strong>",
      "What she carries now is a fragment of that first stone. She has never put it down. In the Economy of Merit she is classified as a transmuter , someone who changes the nature of what already exists rather than creating or destroying. She does not convert damage into nothing. She redirects it, filters it, <em>refines it</em> into something the body can absorb and use.",
