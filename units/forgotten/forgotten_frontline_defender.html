    "paragraphs": [
      "They grew from the Ashblade not through training but through <strong>choice.</strong> At some point in their existence as reborn undead, they were given a choice: to run or to stay. They stayed , and the act of staying changed them. Wood thickened. Roots deepened. Wings emerged, though only good for gliding, not true flight.",
