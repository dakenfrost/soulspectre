    "paragraphs": [
      "The Corrupted Wind Mages communicate in air currents the way linguists communicate in syntax , with extraordinary precision and an irritation for imprecision in others. In life, they were scholars of atmospheric phenomena: those who mapped weather patterns, studied migration, read the political implications of the wind's direction. They already understood that <strong>air was never innocent.</strong>",
      "The corruption did not twist their understanding of wind , it simply removed the intermediate step between observation and action. They no longer describe the storm. <em>They are it.</em> Their movement through the battlefield creates eddies of displaced air that throw off the timing of other units around them , ally and enemy alike, though allies learn to compensate faster.",
