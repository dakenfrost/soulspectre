    "title": "Wood, String, Consequence",
    "paragraphs": [
      "The Archers of the Sentinelle are not glamorous. They were, in life, forest hunters: people who fed families through patient observation and the willingness to hold still while something died. They did not think of themselves as warriors, and they still do not. They think of themselves as problem-solvers with a specific skill set, and the problem on the battlefield is usually the same as the problem in the forest — <strong>something needs to stop moving, and they are the accurate way to make that happen.</strong>",
      "The transition to military use required only a change of target. The patience, the stillness, the ability to calculate for wind and distance — all of this transferred directly. What also transferred was <em>the complete absence of drama about it.</em> The Archers do not celebrate. They note whether the shot was clean and prepare the next one."
    ]
