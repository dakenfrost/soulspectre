<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOULSPECTRE | Squire</title>
    <style>
        body {
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.8;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('../img/valkyrion_bg.jpeg'); 
            background-size: cover;
            background-position: center;
            z-index: -2;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, rgba(10, 10, 12, 0.90), rgba(5, 5, 5, 0.98)); 
            z-index: -1;
        }

        header {
            padding: 60px 20px 30px 20px;
            text-align: center;
            width: 100%;
            max-width: 1100px;
        }

        h1 {
            letter-spacing: 5px;
            font-size: 2.8rem;
            margin: 0;
            color: #fff;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(92, 156, 230, 0.5);
        }

        .subtitle {
            color: #5c9ce6;
            font-size: 1.1rem;
            letter-spacing: 2px;
            margin-top: 10px;
            text-transform: uppercase;
        }

        main {
            max-width: 1100px; 
            padding: 40px 20px;
            width: 100%;
            position: relative;
        }

        /* BANNER INTRODUTTIVO */
        .intro-banner {
            width: 100%;
            max-width: 1100px;
            height: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 3px solid #5c9ce6;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 40px;
            display: block;
        }

        .intro-banner img {
            width: 100%;
            height: auto;
            object-fit: cover;
            display: block;
        }

        /* MODULO NARRATIVO */
        .split-section {
            display: flex;
            gap: 40px;
            align-items: stretch; 
            margin-bottom: 60px; 
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.05);
            border-left: 3px solid #5c9ce6;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .section-image {
            flex: 0 0 40%; 
        }

        .section-image img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            object-position: top center; 
        }

        .section-text {
            flex: 1; 
            padding: 35px;
        }

        h2 {
            color: #fff;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 1.8rem;
        }

        p {
            margin-bottom: 25px;
            color: #ccc;
            font-size: 1.1rem;
            text-align: justify;
        }

        /* MODULO TATTICO E STATISTICHE */
        .tactical-module {
            border-top: 2px solid #5c9ce6;
            padding-top: 40px;
            margin-bottom: 60px;
        }

        .tactical-header {
            text-align: center;
            margin-bottom: 40px;
        }
