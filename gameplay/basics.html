<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOULSPECTRE | The Basics</title>
    <style>
        :root {
            --accent-blue: #5c9ce6;
            --accent-red: #d04b4b;
            --bg-dark: #0a0a0a;
            --panel-bg: rgba(10, 10, 12, 0.95);
            --text-main: #e0e0e0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        #bg-image {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-image: url('../img/homepage_bg.jpg'); 
            background-size: cover;
            background-position: center;
            z-index: -2;
        }

        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: linear-gradient(135deg, rgba(15,15,20,0.95) 0%, rgba(5,5,5,0.98) 100%); 
            z-index: -1;
        }

        header {
            padding: 60px 20px;
            text-align: center;
            width: 100%;
        }

        h1 {
            letter-spacing: 6px;
            font-size: 2.5rem;
            color: #fff;
            text-transform: uppercase;
            margin: 0;
            text-shadow: 0 0 15px rgba(92, 156, 230, 0.3);
        }

        main {
            display: flex;
            width: 90%;
            max-width: 1200px;
            gap: 40px;
            margin-bottom: 50px;
            align-items: flex-start;
        }

        /* SYSTEM LIST */
        .system-list {
            flex: 0 0 40%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .system-btn {
            background: rgba(25, 25, 30, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 25px;
            color: #fff;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
        }

        .system-btn:hover {
            background: rgba(40, 40, 55, 0.9);
            border-left: 4px solid var(--accent-blue);
            transform: translateX(10px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            color: var(--accent-blue);
        }

        /* PREVIEW PANEL */
        .preview-panel {
            flex: 1;
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            min-height: 550px;
            position: sticky;
            top: 40px;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        #preview-img {
            width: 100%;
            height: 320px;
            object-fit: cover;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            filter: brightness(0.8);
            transition: filter 0.3s ease;
            cursor: zoom-in;
        }

        #preview-img:hover {
            filter: brightness(1) contrast(1.1);
        }

        .preview-content { padding: 35px; }

        #preview-title {
            font-size: 1.8rem;
            margin: 0 0 15px 0;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #preview-desc {
            color: #ccc;
            font-size: 1.1rem;
            line-height: 1.8;
            margin: 0;
        }

        .placeholder-text {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 550px;
            color: #444;
            font-style: italic;
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
        }

        .back-link {
            display: block;
            margin: 40px 0;
            color: #666;
            text-decoration: none;
            transition: color 0.3s;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-align: center;
        }

        .back-link:hover { color: #fff; }

        /* Modal / Lightbox Logic */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 9999; 
            left: 0; 
            top: 0;
            width: 100vw; 
            height: 100vh; 
            background-color: rgba(5, 5, 5, 0.95); 
            backdrop-filter: blur(5px);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.show {
            display: block;
            opacity: 1;
        }

        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 95vw;
            max-height: 95vh;
            border: 2px solid var(--accent-blue);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            border-radius: 4px;
            object-fit: contain;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 40px;
            color: #e0e0e0;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s;
            z-index: 10000;
        }

        .close-modal:hover {
            color: var(--accent-red);
        }

        @media (max-width: 900px) {
            main { flex-direction: column; }
            .system-list, .preview-panel { width: 100%; position: static; }
            .preview-panel { min-height: auto; }
        }
    </style>
    <link rel="stylesheet" href="../system/global_nav.css">
</head>
<body>

<div id="bg-image"></div>
<div id="overlay"></div>
<global-navigation base="../"></global-navigation>

<header>
    <h1>The Basics</h1>
</header>

<main>
    <div class="system-list">
        <a href="#" class="system-btn" onmouseover="updatePreview('capital')">The Capital</a>
        <a href="#" class="system-btn" onmouseover="updatePreview('party')">The Party</a>
        <a href="#" class="system-btn" onmouseover="updatePreview('combat')">The Combat System</a>
        <a href="#" class="system-btn" onmouseover="updatePreview('provinces')">Provinces</a>
        <a href="#" class="system-btn" onmouseover="updatePreview('awakening')">Awakening</a>
        <a href="#" class="system-btn" onmouseover="updatePreview('victory')">Victory</a>
    </div>

    <div class="preview-panel" id="panel">
        <div id="default-content" class="placeholder-text">
            Hover over a basic system to access tactical records...
        </div>
        <div id="active-content" style="display: none;">
            <img id="preview-img" src="" alt="System Preview">
            <div class="preview-content">
                <h2 id="preview-title"></h2>
                <p id="preview-desc"></p>
            </div>
        </div>
    </div>
</main>

<a href="index.html" class="back-link">← Return to Strategic Doctrine</a>

<div id="imageModal" class="modal">
    <span class="close-modal">&times;</span>
    <img class="modal-content" id="zoomedImage">
</div>

<script>
    const data = {
        capital: {
            title: "The Capital",
            desc: "Your primary starting base and economic heart. The capital produces a base amount of resources each turn and serves as the only hub where you can construct structures and form new parties. It is permanently defended by your Leader, making it exceptionally difficult to conquer; however, its fall results in an immediate game over.",
            img: "../img/basics_capital.png"
        },
        party: {
            title: "The Party",
            desc: "The fundamental unit of military mobilization. Each party requires an officer to act as the party leader, whom you can name according to your preference. A party configuration can range from a solo leader to a full squad with up to 5 additional party members, for a maximum of 6 units per group.",
            img: "../img/basics_party.png"
        },
        combat: {
            title: "The Combat System",
            desc: "Turn-based tactical engagements between two opposing parties. At the start of each turn, the unit with the highest initiative acts first and selects one of its available skills. In the event of identical initiative values, the acting order is determined randomly. The battle concludes only when one party is totally annihilated.",
            img: "../img/basics_combat.png"
        },
        provinces: {
            title: "Provinces",
            desc: "Regional territories outside the capital. Each province contains its own 'city', and establishing control over it allows you to harvest additional resources for your faction. Be advised: specific resources may be guarded by hostile enemies that must be defeated before you can successfully acquire the assets.",
            img: "../img/basics_provinces.png"
        },
        awakening: {
            title: "Awakening",
            desc: "A progression system tied to the mastery of your leaders. Clearing specific dungeons increases the level of Awakening for your officers. Each new Awakening level allows you to select one out of three additional passive skills, such as increased attack power or bonus elemental damage.",
            img: "../img/basics_awakening.png"
        },
        victory: {
            title: "Victory",
            desc: "While specific campaigns may dictate unique objectives, the standard path to victory involves total faction dominance. In normal mode, a faction wins once all other competing factions have been defeated and their respective capitals have been destroyed.",
            img: "../img/basics_victory.png"
        }
    };

    const defaultContent = document.getElementById('default-content');
    const activeContent = document.getElementById('active-content');
    const pTitle = document.getElementById('preview-title');
    const pDesc = document.getElementById('preview-desc');
    const pImg = document.getElementById('preview-img');

    function updatePreview(key) {
        const info = data[key];
        pTitle.innerText = info.title;
        pDesc.innerText = info.desc;
        pImg.src = info.img;
        
        defaultContent.style.display = 'none';
        activeContent.style.display = 'block';
    }

    // Lightbox Logic con Fix Display
    document.addEventListener('DOMContentLoaded', () => {
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('zoomedImage');
        const previewImg = document.getElementById('preview-img');
        const closeBtn = document.querySelector('.close-modal');

        const closeModal = () => {
            modal.classList.remove('show');
            setTimeout(() => { 
                modal.style.display = "none"; 
            }, 300);
        };

        previewImg.addEventListener('click', function() {
            // Controllo che ci sia un'immagine valida caricata
            if (this.src && !this.src.endsWith('.html') && !this.src.endsWith('/')) { 
                modal.style.display = "block"; // Forza il display block PRIMA dell'animazione
                
                setTimeout(() => {
                    modal.classList.add('show');
                }, 10);
                
                modalImg.src = this.src; 
            }
        });

        closeBtn.addEventListener('click', closeModal);

        modal.addEventListener('click', (e) => {
            if (e.target !== modalImg) {
                closeModal();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape" && modal.classList.contains('show')) {
                closeModal();
            }
        });
    });
</script>
<script src="../system/navigation.js"></script>

</body>
</html>
