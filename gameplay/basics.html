<script>
    const data = {
        capital: {
            title: "The Capital",
            desc: "Your primary starting base and economic heart. The capital produces a base amount of resources each turn and serves as the only hub where you can construct structures and form new parties. It is permanently defended by your Leader, making it exceptionally difficult to conquer; however, its fall results in an immediate game over.",
            img: "../img/basics_capital.png"
        },
        party: {
            title: "The Party",
            desc: "The fundamental unit of military mobilization. Each party requires an officer to act as the party leader, whom you can name according to your preference. A party configuration can range from a solo leader to a full squad with up to 5 additional party members, for a maximum of 6 units per group.",
            img: "../img/basics_party.png"
        },
        combat: {
            title: "The Combat System",
            desc: "Turn-based tactical engagements between two opposing parties. At the start of each turn, the unit with the highest initiative acts first and selects one of its available skills. In the event of identical initiative values, the acting order is determined randomly. The battle concludes only when one party is totally annihilated.",
            img: "../img/basics_combat.png"
        },
        provinces: {
            title: "Provinces",
            desc: "Regional territories outside the capital. Each province contains its own 'city', and establishing control over it allows you to harvest additional resources for your faction. Be advised: specific resources may be guarded by hostile enemies that must be defeated before you can successfully acquire the assets.",
            img: "../img/basics_provinces.png"
        },
        awakening: {
            title: "Awakening",
            desc: "A progression system tied to the mastery of your leaders. Clearing specific dungeons increases the level of Awakening for your officers. Each new Awakening level allows you to select one out of three additional passive skills, such as increased attack power or bonus elemental damage.",
            img: "../img/basics_awakening.png"
        },
        victory: {
            title: "Victory",
            desc: "While specific campaigns may dictate unique objectives, the standard path to victory involves total faction dominance. In normal mode, a faction wins once all other competing factions have been defeated and their respective capitals have been destroyed.",
            img: "../img/basics_victory.png"
        }
    };

    const defaultContent = document.getElementById('default-content');
    const activeContent = document.getElementById('active-content');
    const pTitle = document.getElementById('preview-title');
    const pDesc = document.getElementById('preview-desc');
    const pImg = document.getElementById('preview-img');

    function updatePreview(key) {
        const info = data[key];
        pTitle.innerText = info.title;
        pDesc.innerText = info.desc;
        pImg.src = info.img;
        
        defaultContent.style.display = 'none';
        activeContent.style.display = 'block';
    }

    // --- FIX LIGHTBOX LOGIC ---
    document.addEventListener('DOMContentLoaded', () => {
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('zoomedImage');
        const previewImg = document.getElementById('preview-img');
        const closeBtn = document.querySelector('.close-modal');

        const closeModal = () => {
            modal.classList.remove('show');
            setTimeout(() => { 
                modal.style.display = "none"; 
            }, 300);
        };

        previewImg.addEventListener('click', function() {
            if (this.src && this.src !== window.location.href) { 
                modal.style.display = "block"; // Reset display prima di animare
                
                setTimeout(() => {
                    modal.classList.add('show');
                }, 10);
                
                modalImg.src = this.src; 
            }
        });

        closeBtn.addEventListener('click', closeModal);

        modal.addEventListener('click', (e) => {
            if (e.target !== modalImg) {
                closeModal();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape" && modal.classList.contains('show')) {
                closeModal();
            }
        });
    });
</script>
