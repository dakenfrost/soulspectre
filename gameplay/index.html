<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOULSPECTRE | Systems & Doctrine</title>
    <link rel="stylesheet" href="../system/global_nav.css">
    <style>
        :root {
            --book-text: #d4c4a8; /* Testo pergamena invecchiata */
            --accent-blood: #8a1c1c; /* Rosso scuro tattico/araldico */
            --hover-highlight: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: #050505;
            color: var(--book-text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* SFONDO DEL LIBRO */
        #bg-image {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-image: url('../img/open_book_bg.png'); /* Inserisci qui l'asset del libro aperto */
            background-size: cover;
            background-position: center;
            z-index: -2;
            opacity: 0.4; /* Scurito per non accecare */
        }

        header {
            padding: 40px 20px;
            text-align: center;
            width: 100%;
        }

        h1 {
            letter-spacing: 6px;
            font-size: 2.5rem;
            color: #fff;
            text-transform: uppercase;
            margin: 0;
            text-shadow: 0 0 20px rgba(138, 28, 28, 0.5); /* Riflesso rosso */
        }

        /* LAYOUT A DUE PAGINE */
        main {
            display: flex;
            width: 90%;
            max-width: 1300px;
            min-height: 600px;
            gap: 60px;
            margin-top: 20px;
            margin-bottom: 50px;
        }

        /* PAGINA SINISTRA: L'INDICE */
        .left-page {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 20px 40px;
            border-right: 1px solid rgba(212, 196, 168, 0.2); /* Rilegatura centrale */
        }

        .chapter-title {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #fff;
            border-bottom: 2px solid var(--accent-blood);
            padding-bottom: 10px;
            margin-bottom: 20px;
            opacity: 0.85;
            text-shadow: 0px 0px 1px rgba(255, 255, 255, 0.1);
        }

        .index-item {
            padding: 15px 20px;
            font-size: 1.2rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid transparent;
            opacity: 0.85;
            text-shadow: 0px 0px 1px rgba(255, 255, 255, 0.1);
        }

        .index-item:hover, .index-item.active {
            background: var(--hover-highlight);
            border: 1px solid rgba(212, 196, 168, 0.3);
            color: #fff;
            opacity: 1;
        }

        .index-item::after {
            content: '>';
            color: var(--accent-blood);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .index-item:hover::after, .index-item.active::after {
            opacity: 1;
        }

        /* --- SISTEMA LIGHTBOX (ZOOM OTTICO) --- */
        #lightbox {
            display: none; 
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.92);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
            backdrop-filter: blur(5px);
        }

        #lightbox-img {
            max-width: 95%;
            max-height: 95vh;
            border: 2px solid var(--accent-blood);
            box-shadow: 0 0 50px rgba(0,0,0,1);
            border-radius: 4px;
        }

       /* PAGINA DESTRA: IL CONTENUTO E L'AZIONE */
        .right-page {
            flex: 1;
            padding: 20px 40px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #default-content {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            font-style: italic;
            opacity: 0.5;
            text-align: center;
            font-size: 1.3rem; 
        }

        #active-content {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        /* IMMAGINE CON EFFETTO STAMPA ANTICA */
        #preview-img {
            width: 100%;
            height: auto; 
            aspect-ratio: 16 / 9; 
            max-height: 400px; 
            object-fit: cover;
            border: 1px solid rgba(0, 0, 0, 0.3);
            margin-bottom: 30px; 
            border-radius: 2px;
            cursor: zoom-in; 
            opacity: 0.8;
            filter: sepia(0.4) blur(0.5px) contrast(0.9);
            mix-blend-mode: luminosity;
            transition: all 0.3s ease;
        }

        /* Ritorno alla nitidezza digitale su puntamento */
        #preview-img:hover {
            opacity: 1;
            filter: sepia(0) blur(0) contrast(1.1);
            mix-blend-mode: normal;
        }

        #preview-title {
            font-size: 2.2rem; 
            margin: 0 0 15px 0;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.85;
            text-shadow: 0px 0px 1px rgba(255, 255, 255, 0.1);
        }

        #preview-desc {
            font-size: 1.2rem; 
            line-height: 1.9;
            margin: 0 0 40px 0;
            color: var(--book-text);
            opacity: 0.85;
            text-shadow: 0px 0px 1px rgba(255, 255, 255, 0.1);
        }

        /* IL BOTTONE "APPROFONDISCI" */
        .read-more-btn {
            margin-top: auto;
            padding: 20px; 
            background-color: var(--accent-blood);
            color: #fff;
            text-transform: uppercase;
            font-weight: bold;
            font-size: 1.1rem;
            letter-spacing: 4px;
            text-align: center;
            text-decoration: none;
            border: 1px solid #fff;
            transition: 0.3s;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(138, 28, 28, 0.3);
        }

        .read-more-btn:hover {
            background-color: #fff;
            color: #000;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.5);
        }

        .back-link {
            display: block;
            margin: 40px 0;
            color: #666;
            text-decoration: none;
