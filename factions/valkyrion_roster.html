<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOULSPECTRE | Valkyrion Roster</title>
    <link rel="stylesheet" href="../system/shared.css">
    <link rel="stylesheet" href="../system/roster.css">
    <style>
        :root {
            --accent-color: #5c9ce6;
            --entry-bg:     rgb(5, 5, 12);
            --preview-dark: rgb(5, 5, 12);
        }
        #bg-image { background-image: url('../img/valkyrion_bg.jpeg'); }
        #overlay  { background: linear-gradient(to bottom, rgba(10,10,15,0.95), rgba(5,5,10,1)); }
    </style>
</head>
<body>

<div id="bg-image"></div>
<div id="overlay"></div>
<global-navigation base="../"></global-navigation>

<header>
    <h1>Military Roster</h1>
    <div class="subtitle">The Martial Forces of the Empire</div>
</header>

<main>
    <div class="roster-cards">

        <a href="../units/valkyrion/valkyrion_order_sword.html" class="rcard">
            <div class="rcard-img" style="background-image:url('../img/valkyrion_roster_sword.jpg');"></div>
            <div class="rcard-overlay"></div>
            <div class="rcard-label">
                <span class="rcard-type">Melee Unit</span>
                <span class="rcard-name">Order of the Sword</span>
            </div>
            <span class="rcard-arrow">&#9654;</span>
        </a>

        <a href="../units/valkyrion/valkyrion_order_light.html" class="rcard">
            <div class="rcard-img" style="background-image:url('../img/valkyrion_roster_light.jpg');"></div>
            <div class="rcard-overlay"></div>
            <div class="rcard-label">
                <span class="rcard-type">Support Unit</span>
                <span class="rcard-name">Order of the Light</span>
            </div>
            <span class="rcard-arrow">&#9654;</span>
        </a>

        <a href="../units/valkyrion/valkyrion_order_knowledge.html" class="rcard">
            <div class="rcard-img" style="background-image:url('../img/valkyrion_roster_knowledge.jpg');"></div>
            <div class="rcard-overlay"></div>
            <div class="rcard-label">
                <span class="rcard-type">Mage Unit</span>
                <span class="rcard-name">Order of Knowledge</span>
            </div>
            <span class="rcard-arrow">&#9654;</span>
        </a>

        <a href="../units/valkyrion/valkyrion_order_engineering.html" class="rcard">
            <div class="rcard-img" style="background-image:url('../img/valkyrion_roster_engineering.jpg');"></div>
            <div class="rcard-overlay"></div>
            <div class="rcard-label">
                <span class="rcard-type">Ranged Unit</span>
                <span class="rcard-name">Order of Engineering</span>
            </div>
            <span class="rcard-arrow">&#9654;</span>
        </a>

        <div class="rcard locked-rcard">
            <div class="rcard-img" style="background-image:url('../img/valkyrion_roster_hybrids.png'); filter:grayscale(1) brightness(0.35);"></div>
            <div class="rcard-overlay"></div>
            <div class="rcard-locked-overlay">&#9632; CLASSIFIED &#9632;</div>
            <div class="rcard-label">
                <span class="rcard-name" style="color:rgba(80,80,80,0.5);">Hybrid Units</span>
            </div>
        </div>

        <a href="../units/valkyrion/valkyrion_extra.html" class="rcard others-rcard">
            <div class="rcard-img" style="background-image:url('../img/valkyrion_roster_others.png');"></div>
            <div class="rcard-overlay" style="background:linear-gradient(to top,rgba(5,5,12,0.82) 0%,rgba(5,5,12,0.30) 45%,rgba(0,0,0,0.05) 100%);"></div>
            <div class="rcard-label">
                <span class="rcard-type" style="color:#888;">Miscellaneous</span>
                <span class="rcard-name" style="color:rgba(200,200,200,0.7);">Others</span>
            </div>
            <span class="rcard-arrow" style="color:#888;">&#9654;</span>
        </a>

    </div>
    <a href="../factions/valkyrion.html" class="back-link">← Return to Valkyrion Overview</a>
</main>

<script>
    document.querySelectorAll('.rcard:not(.locked-rcard)').forEach(card => {
        card.addEventListener('click', e => {
            e.preventDefault();
            const href = card.getAttribute('href');
            if (!href) return;
            const flash = document.createElement('div');
            flash.className = 'flash';
            document.body.appendChild(flash);
            setTimeout(() => { window.location.href = href; }, 130);
        });
    });
</script>
<script src="../system/navigation.js"></script>

</body>
</html>
