<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOULSPECTRE | Valkyrion Roster</title>
    <link rel="stylesheet" href="../system/shared.css">
    <style>
        :root {
            --accent-color: #5c9ce6;
            --entry-bg:     rgb(5, 5, 12);
        }
        
        #bg-image { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url('../img/valkyrion_bg.jpeg'); 
            background-size: cover; background-position: center; z-index: -2;
        }
        
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(to bottom, rgba(10,10,15,0.95), rgba(5,5,10,1)); 
            z-index: -1;
        }

        header { padding: 60px 20px 10px 20px; text-align: center; }
        h1 { letter-spacing: 8px; font-size: 3rem; text-transform: uppercase; margin: 0; color: #fff; text-shadow: 0 0 20px rgba(92,156,230,0.5); }
        .subtitle { color: var(--accent-color); letter-spacing: 2px; margin-top: 5px; font-size: 1.1rem; }
        
        main { max-width: 1300px; width: 100%; padding: 0 20px 60px; margin: 0 auto; }

        /* ─── GRIGLIA IBRIDA A 3 COLONNE ─── */
        .hybrid-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 100%;
            height: 600px; /* Altezza massiccia per far respirare le immagini */
            margin: 40px auto;
        }

        /* Il contenitore rettangolare di ogni colonna */
        .h-col {
            position: relative;
            background: var(--entry-bg);
            border-bottom: 3px solid var(--accent-color);
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        /* La singola metà (Triangolo) */
        .shard-half {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: block;
            text-decoration: none;
            overflow: hidden;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), z-index 0.4s;
            z-index: 1;
            background: #050505;
        }

        /* 
           Forme Geometriche Assolute 
           TL = Top Left | BR = Bottom Right | TR = Top Right | BL = Bottom Left
        */
        .clip-tl { clip-path: polygon(0 0, 100% 0, 0 100%); }
        .clip-br { clip-path: polygon(100% 0, 100% 100%, 0 100%); }
        
        .clip-tr { clip-path: polygon(0 0, 100% 0, 100% 100%); }
        .clip-bl { clip-path: polygon(0 0, 100% 100%, 0 100%); }

        /* Sfondo e Overlay */
        .h-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0.5;
            transition: opacity 0.4s ease, transform 0.6s ease;
        }

        .h-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.8) 100%);
            z-index: 2;
        }

        /* Effetto Zoom e Sovrapposizione al passaggio del mouse */
        .shard-half:not(.locked):hover {
            transform: scale(1.03); /* Il triangolo esce dai suoi bordi e copre il gemello */
            z-index: 10;
        }
        .shard-half:not(.locked):hover .h-bg {
            opacity: 0.9;
            transform: scale(1.08);
        }

        /* Posizionamento Testi nel Baricentro del triangolo */
        .h-content {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 60%; /* Spazio ampio per i testi */
            transform: translate(-50%, -50%);
            z-index: 5;
            pointer-events: none;
        }

        /* Ancoraggio preciso nei punti più larghi di ogni forma */
        .clip-tl .h-content { top: 28%; left: 28%; }
        .clip-br .h-content { top: 72%; left: 72%; }
        .clip-tr .h-content { top: 28%; left: 72%; }
        .clip-bl .h-content { top: 72%; left: 28%; }

        /* Tipografia */
        .h-type {
            font-size: 0.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent-color);
            margin-bottom: 5px;
            text-shadow: 0 2px 8px rgba(0,0,0,1);
        }

        .h-name {
            font-size: 1.3rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ccc;
            text-shadow: 0 2px 10px rgba(0,0,0,1);
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }

        .shard-half:not(.locked):hover .h-name {
            color: #fff;
            text-shadow: 0 0 15px var(--accent-color);
        }

        /* Unità Bloccate */
        .shard-half.locked {
            filter: grayscale(1) brightness(0.4);
            cursor: not-allowed;
        }
        .shard-half.locked .h-type { color: #555; }
        .shard-half.locked .h-name { color: #777; }

        .back-link { display: block; text-align: center; margin-top: 40px; color: #666; text-decoration: none; padding: 20px; transition: color 0.3s ease; border-top: 1px solid rgba(255,255,255,0.05); }
        .back-link:hover { color: var(--accent-color); }

        /* Responsive Mobile */
        @media (max-width: 900px) {
            .hybrid-grid { grid-template-columns: 1fr; height: auto; }
            .h-col { height: 350px; margin-bottom: 20px; } /* Colonne impilate con altezza fissa */
        }
    </style>
</head>
<body>

<div id="bg-image"></div>
<div id="overlay"></div>
<global-navigation base="../"></global-navigation>

<header>
    <h1>Military Roster</h1>
    <div class="subtitle">The Martial Forces of the Empire</div>
</header>

<main>
    <div class="hybrid-grid">

        <!-- COLONNA 1: Melee (Alto Sx) / Caster (Basso Dx) -->
        <div class="h-col">
            <a href="../units/valkyrion/valkyrion_order_sword.html" class="shard-half clip-tl">
                <div class="h-bg" style="background-image:url('../img/valkyrion_roster_sword.jpg');"></div>
                <div class="h-overlay"></div>
                <div class="h-content">
                    <span class="h-type">Melee</span>
                    <span class="h-name">Order of the Sword</span>
                </div>
            </a>
            
            <a href="../units/valkyrion/valkyrion_order_knowledge.html" class="shard-half clip-br">
                <div class="h-bg" style="background-image:url('../img/valkyrion_roster_knowledge.jpg');"></div>
                <div class="h-overlay"></div>
                <div class="h-content">
                    <span class="h-type">Caster</span>
                    <span class="h-name">Order of Knowledge</span>
                </div>
            </a>
        </div>

        <!-- COLONNA 2: Support (Alto Dx) / Ranged (Basso Sx) -->
        <div class="h-col">
            <a href="../units/valkyrion/valkyrion_order_light.html" class="shard-half clip-tr">
                <div class="h-bg" style="background-image:url('../img/valkyrion_roster_light.jpg');"></div>
                <div class="h-overlay"></div>
                <div class="h-content">
                    <span class="h-type">Support</span>
                    <span class="h-name">Order of the Light</span>
                </div>
            </a>

            <a href="../units/valkyrion/valkyrion_order_engineering.html" class="shard-half clip-bl">
                <div class="h-bg" style="background-image:url('../img/valkyrion_roster_engineering.jpg');"></div>
                <div class="h-overlay"></div>
                <div class="h-content">
                    <span class="h-type">Ranged</span>
                    <span class="h-name">Order of Engineering</span>
                </div>
            </a>
        </div>

        <!-- COLONNA 3: Hybrid (Alto Sx) / Others (Basso Dx) -->
        <div class="h-col">
            <div class="shard-half clip-tl locked">
                <div class="h-bg" style="background-image:url('../img/valkyrion_roster_hybrids.png');"></div>
                <div class="h-overlay"></div>
                <div class="h-content">
                    <span class="h-type" style="color: #444;">Classified</span>
                    <span class="h-name">Hybrid Units</span>
                </div>
            </div>

            <a href="../units/valkyrion/valkyrion_extra.html" class="shard-half clip-br">
                <div class="h-bg" style="background-image:url('../img/valkyrion_roster_others.png'); filter: grayscale(0.5);"></div>
                <div class="h-overlay"></div>
                <div class="h-content">
                    <span class="h-type" style="color: #888;">Misc</span>
                    <span class="h-name" style="color: #bbb;">Others</span>
                </div>
            </a>
        </div>

    </div>

    <a href="../factions/valkyrion.html" class="back-link">← Return to Valkyrion Overview</a>
</main>

<script>
    document.querySelectorAll('.shard-half:not(.locked)').forEach(card => {
        card.addEventListener('click', e => {
            e.preventDefault();
            const href = card.getAttribute('href');
            if (!href) return;
            const flash = document.createElement('div');
            flash.className = 'flash';
            document.body.appendChild(flash);
            setTimeout(() => { window.location.href = href; }, 130);
        });
    });
</script>
<script src="../system/navigation.js"></script>

</body>
</html>
