<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOULSPECTRE | Valkyrion Roster</title>
    <link rel="stylesheet" href="../system/shared.css">
    <style>
        :root {
            --accent-color: #5c9ce6;
            --entry-bg:     rgb(5, 5, 12);
        }
        
        #bg-image { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url('../img/valkyrion_bg.jpeg'); 
            background-size: cover; background-position: center; z-index: -2;
        }
        
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(to bottom, rgba(10,10,15,0.95), rgba(5,5,10,1)); 
            z-index: -1;
        }

        header { padding: 60px 20px 10px 20px; text-align: center; }
        h1 { letter-spacing: 8px; font-size: 3rem; text-transform: uppercase; margin: 0; color: #fff; text-shadow: 0 0 20px rgba(92,156,230,0.5); }
        .subtitle { color: var(--accent-color); letter-spacing: 2px; margin-top: 5px; font-size: 1.1rem; }
        
        main { max-width: 1400px; width: 100%; padding: 0 20px 60px; margin: 0 auto; }

        /* ─── GRIGLIA RETTANGOLARE AD ALTA EFFICIENZA ─── */
        .roster-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 colonne */
            gap: 20px; /* Spazio uniforme tra le schede */
            margin: 40px auto;
            width: 100%;
        }

        .roster-card {
            position: relative;
            height: 280px; /* Altezza panoramica */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            border-bottom: 3px solid var(--accent-color);
            border-radius: 4px;
            background: var(--entry-bg);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s ease;
        }

        .rcard-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            transition: transform 0.6s ease, opacity 0.4s ease;
            opacity: 0.6;
            z-index: 1;
        }

        .rcard-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.8) 100%);
            z-index: 2;
            transition: background 0.4s ease;
        }

        /* Effetti Hover */
        .roster-card:not(.locked):hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.9), 0 0 15px rgba(92,156,230,0.2);
            border-bottom-color: #fff;
        }
        
        .roster-card:not(.locked):hover .rcard-bg {
            transform: scale(1.08);
            opacity: 0.9;
        }

        .roster-card:not(.locked):hover .rcard-overlay {
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.5) 100%);
        }

        /* Testi centrati e perfetti */
        .rcard-content {
            position: relative;
            z-index: 5;
            text-align: center;
            width: 90%;
            pointer-events: none;
        }

        .rcard-type {
            display: block;
            font-size: 0.85rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent-color);
            margin-bottom: 8px;
            text-shadow: 0 2px 8px rgba(0,0,0,1);
        }

        .rcard-name {
            display: block;
            font-size: 1.4rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ccc;
            text-shadow: 0 2px 10px rgba(0,0,0,1);
            transition: color 0.3s ease, letter-spacing 0.3s ease;
        }

        .roster-card:not(.locked):hover .rcard-name {
            color: #fff;
            letter-spacing: 3px;
            text-shadow: 0 0 15px var(--accent-color);
        }

        /* Stato Bloccato */
        .roster-card.locked {
            filter: grayscale(1) brightness(0.4);
            cursor: not-allowed;
            border-bottom-color: #333;
        }
        .roster-card.locked .rcard-type { color: #666; }
        .roster-card.locked .rcard-name { color: #888; }

        .back-link { display: block; text-align: center; margin-top: 40px; color: #666; text-decoration: none; padding: 20px; transition: color 0.3s ease; border-top: 1px solid rgba(255,255,255,0.05); }
        .back-link:hover { color: var(--accent-color); }

        /* Responsive */
        @media (max-width: 1024px) {
            .roster-grid { grid-template-columns: repeat(2, 1fr); } /* 2 colonne su tablet */
        }
        @media (max-width: 600px) {
            .roster-grid { grid-template-columns: 1fr; } /* 1 colonna su smartphone */
            .roster-card { height: 220px; }
        }
    </style>
</head>
<body>

<div id="bg-image"></div>
<div id="overlay"></div>
<global-navigation base="../"></global-navigation>

<header>
    <h1>Military Roster</h1>
    <div class="subtitle">The Martial Forces of the Empire</div>
</header>

<main>
    <div class="roster-grid">

        <a href="../units/valkyrion/valkyrion_order_sword.html" class="roster-card">
            <div class="rcard-bg" style="background-image:url('../img/valkyrion_roster_sword.jpg');"></div>
            <div class="rcard-overlay"></div>
            <div class="rcard-content">
                <span class="rcard-type">Melee</span>
                <span class="rcard-name">Order of the Sword</span>
            </div>
        </a>

        <a href="../units/valkyrion/valkyrion_order_engineering.html" class="roster-card">
            <div class="rcard-bg" style="background-image:url('../img/valkyrion_roster_engineering.jpg');"></div>
            <div class="rcard-overlay"></div>
            <div class="rcard-content">
                <span class="rcard-type">Ranged</span>
                <span class="rcard-name">Order of Engineering</span>
            </div>
        </a>

        <div class="roster-card locked">
            <div class="rcard-bg" style="background-image:url('../img/valkyrion_roster_hybrids.png');"></div>
            <div class="rcard-overlay"></div>
            <div class="rcard-content">
                <span class="rcard-type" style="color: #555;">Classified</span>
                <span class="rcard-name">Hybrid Units</span>
            </div>
        </div>

        <a href="../units/valkyrion/valkyrion_order_knowledge.html" class="roster-card">
            <div class="rcard-bg" style="background-image:url('../img/valkyrion_roster_knowledge.jpg');"></div>
            <div class="rcard-overlay"></div>
            <div class="rcard-content">
                <span class="rcard-type">Caster</span>
                <span class="rcard-name">Order of Knowledge</span>
            </div>
        </a>

        <a href="../units/valkyrion/valkyrion_order_light.html" class="roster-card">
            <div class="rcard-bg" style="background-image:url('../img/valkyrion_roster_light.jpg');"></div>
            <div class="rcard-overlay"></div>
            <div class="rcard-content">
                <span class="rcard-type">Support</span>
                <span class="rcard-name">Order of the Light</span>
            </div>
        </a>

        <a href="../units/valkyrion/valkyrion_extra.html" class="roster-card">
            <div class="rcard-bg" style="background-image:url('../img/valkyrion_roster_others.png'); filter: grayscale(0.5);"></div>
            <div class="rcard-overlay"></div>
            <div class="rcard-content">
                <span class="rcard-type" style="color: #888;">Misc</span>
                <span class="rcard-name" style="color: #bbb;">Others</span>
            </div>
        </a>

    </div>

    <a href="../factions/valkyrion.html" class="back-link">← Return to Valkyrion Overview</a>
</main>

<script>
    document.querySelectorAll('.roster-card:not(.locked)').forEach(card => {
        card.addEventListener('click', e => {
            e.preventDefault();
            const href = card.getAttribute('href');
            if (!href) return;
            const flash = document.createElement('div');
            flash.className = 'flash';
            document.body.appendChild(flash);
            setTimeout(() => { window.location.href = href; }, 130);
        });
    });
</script>
<script src="../system/navigation.js"></script>

</body>
</html>
