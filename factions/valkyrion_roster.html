<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOULSPECTRE | Valkyrion Roster</title>
    <link rel="stylesheet" href="../system/shared.css">
    <link rel="stylesheet" href="../system/roster.css">
    <style>
        :root {
            --accent-color: #5c9ce6;
            --entry-bg:     rgb(5, 5, 12);
            --preview-dark: rgb(5, 5, 12);
        }
        #bg-image { background-image: url('../img/valkyrion_bg.jpeg'); }
        #overlay  { background: linear-gradient(to bottom, rgba(10,10,15,0.95), rgba(5,5,10,1)); }
    </style>
</head>
<body>

<div id="bg-image"></div>
<div id="overlay"></div>
<global-navigation base="../"></global-navigation>

<header>
    <h1>Military Roster</h1>
    <div class="subtitle">The Martial Forces of the Empire</div>
</header>

<main>
    <div class="roster-layout">

        <!-- LEFT: numbered list -->
        <nav class="roster-list">

            <a href="../units/valkyrion/valkyrion_order_sword.html"
               class="roster-entry" data-index="0">
                <div class="entry-content">
                    <h2 class="entry-title">Order of the Sword</h2>
                    <span class="entry-arrow">&#9654;</span>
                </div>
            </a>

            <a href="../units/valkyrion/valkyrion_order_light.html"
               class="roster-entry" data-index="1">
                <div class="entry-content">
                    <h2 class="entry-title">Order of the Light</h2>
                    <span class="entry-arrow">&#9654;</span>
                </div>
            </a>

            <a href="../units/valkyrion/valkyrion_order_knowledge.html"
               class="roster-entry" data-index="2">
                <div class="entry-content">
                    <h2 class="entry-title">Order of Knowledge</h2>
                    <span class="entry-arrow">&#9654;</span>
                </div>
            </a>

            <a href="../units/valkyrion/valkyrion_order_engineering.html"
               class="roster-entry" data-index="3">
                <div class="entry-content">
                    <h2 class="entry-title">Order of Engineering</h2>
                    <span class="entry-arrow">&#9654;</span>
                </div>
            </a>

            <div class="roster-entry locked-entry" data-index="4">
                <div class="entry-content">
                    <h2 class="entry-title">Hybrid Units</h2>
                    <span class="lock-badge">Locked</span>
                </div>
            </div>

            <a href="../units/valkyrion/valkyrion_extra.html"
               class="roster-entry others-entry" data-index="5">
                <div class="entry-content">
                    <h2 class="entry-title">Others</h2>
                    <span class="entry-arrow">&#9654;</span>
                </div>
            </a>

        </nav>

        <!-- RIGHT: preview panel -->
        <div class="roster-preview" id="roster-preview">

            <div class="preview-slide is-visible" data-index="0">
                <div class="preview-img" style="background-image:url('../img/valkyrion_roster_sword.jpg');"></div>
                <div class="preview-grad"></div>
                <div class="preview-label">
                    <span class="preview-label-name">Mele Unit</span>
                </div>
            </div>

            <div class="preview-slide" data-index="1">
                <div class="preview-img" style="background-image:url('../img/valkyrion_roster_light.jpg');"></div>
                <div class="preview-grad"></div>
                <div class="preview-label">
                    <span class="preview-label-name">Support Unit</span>
                </div>
            </div>

            <div class="preview-slide" data-index="2">
                <div class="preview-img" style="background-image:url('../img/valkyrion_roster_knowledge.jpg');"></div>
                <div class="preview-grad"></div>
                <div class="preview-label">
                    <span class="preview-label-name">Mage Unit</span>
                </div>
            </div>

            <div class="preview-slide" data-index="3">
                <div class="preview-img" style="background-image:url('../img/valkyrion_roster_engineering.jpg');"></div>
                <div class="preview-grad"></div>
                <div class="preview-label">
                    <span class="preview-label-name">Ranged Unit</span>
                </div>
            </div>

            <div class="preview-slide" data-index="4">
                <div class="preview-img" style="background-image:url('../img/valkyrion_roster_hybrids.png'); filter:grayscale(1) brightness(0.35);"></div>
                <div class="preview-grad"></div>
                <div class="preview-locked-overlay">&#9632; CLASSIFIED &#9632;</div>
                <div class="preview-label">
                    <span class="preview-label-num" style="color:rgba(80,80,80,0.15);">05</span>
                    <span class="preview-label-name" style="color:rgba(80,80,80,0.5);">Hybrid Units</span>
                </div>
            </div>

            <div class="preview-slide" data-index="5">
                <div class="preview-img" style="background-image:url('../img/valkyrion_roster_others.png');"></div>
                <div class="preview-grad"></div>
                <div class="preview-label">
                    <span class="preview-label-name" style="color:rgba(200,200,200,0.6);">Others</span>
                </div>
            </div>

            <div class="preview-corner"></div>
        </div>

    </div>
    <a href="../factions/valkyrion.html" class="back-link">← Return to Valkyrion Overview</a>
</main>

<script>
    const entries = document.querySelectorAll('.roster-entry');
    const slides  = document.querySelectorAll('.preview-slide');

    function activate(idx) {
        entries.forEach(e => e.classList.remove('is-active'));
        slides.forEach(s  => s.classList.remove('is-visible'));
        entries[idx].classList.add('is-active');
        slides[idx].classList.add('is-visible');
    }

    entries.forEach((entry, idx) => {
        entry.addEventListener('mouseenter', () => activate(idx));
        if (!entry.classList.contains('locked-entry')) {
            entry.addEventListener('click', e => {
                e.preventDefault();
                const href = entry.getAttribute('href');
                if (!href) return;
                const flash = document.createElement('div');
                flash.className = 'flash';
                document.body.appendChild(flash);
                setTimeout(() => { window.location.href = href; }, 130);
            });
        }
    });

    activate(0);
</script>
<script src="../system/navigation.js"></script>

</body>
</html>
