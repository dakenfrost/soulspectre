<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOULSPECTRE | Fazioni</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #bg-image {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-image: url('../img/homepage_bg.jpg'); 
            background-size: cover;
            background-position: center;
            z-index: -2;
        }

        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: linear-gradient(135deg, rgba(10,10,15,0.95) 0%, rgba(5,5,5,0.98) 100%); 
            z-index: -1;
        }

        header {
            padding: 60px 20px;
            text-align: center;
            width: 100%;
        }

        h1 {
            letter-spacing: 6px;
            font-size: 2.5rem;
            color: #fff;
            text-transform: uppercase;
            margin: 0;
        }

        main {
            display: flex;
            width: 90%;
            max-width: 1200px;
            gap: 40px;
            margin-bottom: 50px;
            align-items: flex-start;
        }

        /* COLONNA SINISTRA: LISTA BOTTONI */
        .faction-list {
            flex: 0 0 40%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .faction-btn {
            background: rgba(20, 20, 25, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            color: #fff;
            text-decoration: none;
            font-size: 1.4rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .faction-btn:hover {
            border-color: #5c9ce6;
            background: rgba(30, 30, 45, 1);
            transform: translateX(10px);
        }

        .faction-btn.valkyrion:hover { border-left: 5px solid #5c9ce6; color: #5c9ce6; }
        .faction-btn.forgotten:hover { border-left: 5px solid #a0a0a0; color: #a0a0a0; }

        /* COLONNA DESTRA: PREVIEW PANEL */
        .preview-panel {
            flex: 1;
            background: rgba(15, 15, 15, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 0;
            min-height: 500px;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        #preview-img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            transition: opacity 0.3s ease;
        }

        .preview-content {
            padding: 30px;
        }

        #preview-title {
            font-size: 1.8rem;
            margin: 0 0 15px 0;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #preview-desc {
            color: #aaa;
            font-size: 1.1rem;
            line-height: 1.7;
            margin-bottom: 20px;
        }

        .placeholder-text {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #444;
            font-style: italic;
            text-align: center;
            padding: 40px;
        }

        .back-link {
            margin-top: auto;
            padding: 40px;
            color: #666;
            text-decoration: none;
            transition: color 0.3s;
        }

        .back-link:hover { color: #fff; }

        @media (max-width: 900px) {
            main { flex-direction: column; }
            .faction-list, .preview-panel { flex: 1 1 100%; width: 100%; position: static; }
        }
    </style>
</head>
<body>

<div id="bg-image"></div>
<div id="overlay"></div>

<header>
    <h1>Fazioni del Mondo</h1>
</header>

<main>
    <div class="faction-list">
        <a href="valkyrion_main.html" class="faction-btn valkyrion" 
           onmouseover="updatePreview('valkyrion')" 
           onmouseout="resetPreview()">
            Valkyrion Empire
        </a>

        <a href="forgotten_main.html" class="faction-btn forgotten" 
           onmouseover="updatePreview('forgotten')" 
           onmouseout="resetPreview()">
            The Forgotten
        </a>
    </div>

    <div class="preview-panel" id="panel">
        <div id="default-content" class="placeholder-text">
            Passa il cursore su una fazione per visualizzare i dati dell'archivio.
        </div>
        <div id="active-content" style="display: none;">
            <img id="preview-img" src="" alt="">
            <div class="preview-content">
                <h2 id="preview-title"></h2>
                <p id="preview-desc"></p>
            </div>
        </div>
    </div>
</main>

<a href="../index.html" class="back-link">← Torna all'Archivio Centrale</a>

<script>
    const data = {
        valkyrion: {
            title: "Valkyrion Empire",
            desc: "Un impero di cavalieri disillusi che hanno sostituito l'onore cieco con la fredda ragione. Maestri della specializzazione arcana e militante, utilizzano la conoscenza come scudo e la ritorsione logica come spada.",
            img: "../img/faction_preview_valkyrion.jpg"
        },
        forgotten: {
            title: "The Forgotten",
            desc: "Resti di un'epoca perduta che sfidano le leggi convenzionali. Unità mistiche e instabili che traggono potere dal decadimento e dall'oblio. Un enigma tattico che attende di essere decifrato.",
            img: "../img/faction_preview_forgotten.jpg"
        }
    };

    const defaultContent = document.getElementById('default-content');
    const activeContent = document.getElementById('active-content');
    const pTitle = document.getElementById('preview-title');
    const pDesc = document.getElementById('preview-desc');
    const pImg = document.getElementById('preview-img');

    function updatePreview(faction) {
        const info = data[faction];
        pTitle.innerText = info.title;
        pDesc.innerText = info.desc;
        pImg.src = info.img;
        
        defaultContent.style.display = 'none';
        activeContent.style.display = 'block';
    }

    function resetPreview() {
        // Opzionale: puoi scegliere di lasciare l'ultima visualizzata o resettare.
        // Se vuoi resettare, togli il commento qui sotto:
        /*
        defaultContent.style.display = 'flex';
        activeContent.style.display = 'none';
        */
    }
</script>

</body>
</html>
