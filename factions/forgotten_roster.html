<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOULSPECTRE | Forgotten Roster</title>
    <link rel="stylesheet" href="../system/shared.css">
    <link rel="stylesheet" href="../system/roster.css">
    <style>
        :root {
            --accent-color: #5cb88a;
            --entry-bg:     rgb(4, 9, 6);
            --preview-dark: rgb(4, 9, 6);
        }
        #bg-image { background-image: url('../img/forgotten/forgotten_bg.jpg'); }
        #overlay  { background: linear-gradient(to bottom, rgba(5,12,8,0.95), rgba(3,8,5,1)); }
    </style>
</head>
<body>
<div id="bg-image"></div>
<div id="overlay"></div>
<global-navigation base="../"></global-navigation>
<header>
    <h1>Military Roster</h1>
    <div class="subtitle">The Four Branches of the Forgotten</div>
</header>
<main>
    <div class="roster-layout">

        <!-- LEFT: numbered list -->
        <nav class="roster-list">

            <a href="../units/forgotten/forgotten_order_arborei.html"
               class="roster-entry" data-index="0">
                <div class="entry-content">
                    <h2 class="entry-title">Arboreal Fighters</h2>
                    <span class="entry-arrow">&#9654;</span>
                </div>
            </a>

            <a href="../units/forgotten/forgotten_order_linfa.html"
               class="roster-entry" data-index="1">
                <div class="entry-content">
                    <h2 class="entry-title">Shadows of the Sap</h2>
                    <span class="entry-arrow">&#9654;</span>
                </div>
            </a>

            <a href="../units/forgotten/forgotten_order_araldi.html"
               class="roster-entry" data-index="2">
                <div class="entry-content">
                    <h2 class="entry-title">Heralds of Dust</h2>
                    <span class="entry-arrow">&#9654;</span>
                </div>
            </a>

            <a href="../units/forgotten/forgotten_order_sentinelle.html"
               class="roster-entry" data-index="3">
                <div class="entry-content">
                    <h2 class="entry-title">Amber Sentinels</h2>
                    <span class="entry-arrow">&#9654;</span>
                </div>
            </a>

            <div class="roster-entry locked-entry" data-index="4">
                <div class="entry-content">
                    <h2 class="entry-title">Hybrid Units</h2>
                    <span class="lock-badge">Locked</span>
                </div>
            </div>

            <a href="../units/forgotten/forgotten_extra.html"
               class="roster-entry others-entry" data-index="5">
                <div class="entry-content">
                    <h2 class="entry-title">Others</h2>
                    <span class="entry-arrow">&#9654;</span>
                </div>
            </a>

        </nav>

        <!-- RIGHT: preview panel -->
        <div class="roster-preview" id="roster-preview">

            <div class="preview-slide is-visible" data-index="0">
                <div class="preview-img" style="background-image:url('../img/forgotten/forgotten_roster_arborei.jpg');"></div>
                <div class="preview-grad"></div>
                <div class="preview-label">
                    <span class="preview-label-name">Mele Unit</span>
                </div>
            </div>

            <div class="preview-slide" data-index="1">
                <div class="preview-img" style="background-image:url('../img/forgotten/forgotten_roster_linfa.jpg');"></div>
                <div class="preview-grad"></div>
                <div class="preview-label">
                    <span class="preview-label-name">Support Unit</span>
                </div>
            </div>

            <div class="preview-slide" data-index="2">
                <div class="preview-img" style="background-image:url('../img/forgotten/forgotten_roster_araldi.jpg');"></div>
                <div class="preview-grad"></div>
                <div class="preview-label">
                    <span class="preview-label-name">Mage Unit</span>
                </div>
            </div>

            <div class="preview-slide" data-index="3">
                <div class="preview-img" style="background-image:url('../img/forgotten/forgotten_roster_sentinelle.jpg');"></div>
                <div class="preview-grad"></div>
                <div class="preview-label">
                    <span class="preview-label-name">Ranged Unit</span>
                </div>
            </div>

            <div class="preview-slide" data-index="4">
                <div class="preview-img" style="background-image:url('../img/forgotten/forgotten_roster_hybrids.png'); filter:grayscale(1) brightness(0.4);"></div>
                <div class="preview-grad"></div>
                <div class="preview-locked-overlay">&#9632; CLASSIFIED &#9632;</div>
                <div class="preview-label">
                    <span class="preview-label-name" style="color:rgba(80,80,80,0.5);">Hybrid Units</span>
                </div>
            </div>

            <div class="preview-slide" data-index="5">
                <div class="preview-img" style="background-image:url('../img/forgotten/forgotten_roster_others.png');"></div>
                <div class="preview-grad" style="background:linear-gradient(100deg,rgba(4,9,6,0.75) 0%,rgba(4,9,6,0.12) 50%,rgba(0,0,0,0) 100%);"></div>
                <div class="preview-label">
                    <span class="preview-label-name" style="color:rgba(200,200,200,0.6);">Others</span>
                </div>
            </div>

            <div class="preview-corner"></div>
        </div>

    </div>
    <a href="forgotten.html" class="back-link">← Return to the Forgotten Overview</a>
</main>

<script>
    const entries = document.querySelectorAll('.roster-entry');
    const slides  = document.querySelectorAll('.preview-slide');

    function activate(idx) {
        entries.forEach(e => e.classList.remove('is-active'));
        slides.forEach(s  => s.classList.remove('is-visible'));
        entries[idx].classList.add('is-active');
        slides[idx].classList.add('is-visible');
    }

    entries.forEach((entry, idx) => {
        entry.addEventListener('mouseenter', () => activate(idx));
        if (!entry.classList.contains('locked-entry')) {
            entry.addEventListener('click', e => {
                e.preventDefault();
                const href = entry.getAttribute('href');
                if (!href) return;
                const flash = document.createElement('div');
                flash.className = 'flash';
                document.body.appendChild(flash);
                setTimeout(() => { window.location.href = href; }, 130);
            });
        }
    });

    activate(0);
</script>
<script src="../system/navigation.js"></script>
</body>
</html>
