<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOULSPECTRE | Forgotten Roster</title>
    <link rel="stylesheet" href="../system/shared.css">
    <link rel="stylesheet" href="../system/roster.css">
    <style>
        :root {
            --accent-color: #5cb88a;
            --entry-bg:     rgb(4, 9, 6);
            --preview-dark: rgb(4, 9, 6);
        }
        #bg-image { background-image: url('../img/forgotten/forgotten_bg.jpg'); }
        #overlay  { background: linear-gradient(to bottom, rgba(5,12,8,0.95), rgba(3,8,5,1)); }
    </style>
</head>
<body>
<div id="bg-image"></div>
<div id="overlay"></div>
<global-navigation base="../"></global-navigation>
<header>
    <h1>Military Roster</h1>
    <div class="subtitle">The Four Branches of the Forgotten</div>
</header>
<main>
    <div class="roster-cards">

        <a href="../units/forgotten/forgotten_order_arborei.html" class="rcard">
            <div class="rcard-img" style="background-image:url('../img/forgotten/forgotten_roster_arborei.jpg');"></div>
            <div class="rcard-overlay"></div>
            <div class="rcard-label">
                <span class="rcard-type">Melee Unit</span>
                <span class="rcard-name">Arboreal Fighters</span>
            </div>
            <span class="rcard-arrow">&#9654;</span>
        </a>

        <a href="../units/forgotten/forgotten_order_linfa.html" class="rcard">
            <div class="rcard-img" style="background-image:url('../img/forgotten/forgotten_roster_linfa.jpg');"></div>
            <div class="rcard-overlay"></div>
            <div class="rcard-label">
                <span class="rcard-type">Support Unit</span>
                <span class="rcard-name">Shadows of the Sap</span>
            </div>
            <span class="rcard-arrow">&#9654;</span>
        </a>

        <a href="../units/forgotten/forgotten_order_araldi.html" class="rcard">
            <div class="rcard-img" style="background-image:url('../img/forgotten/forgotten_roster_araldi.jpg');"></div>
            <div class="rcard-overlay"></div>
            <div class="rcard-label">
                <span class="rcard-type">Mage Unit</span>
                <span class="rcard-name">Heralds of Dust</span>
            </div>
            <span class="rcard-arrow">&#9654;</span>
        </a>

        <a href="../units/forgotten/forgotten_order_sentinelle.html" class="rcard">
            <div class="rcard-img" style="background-image:url('../img/forgotten/forgotten_roster_sentinelle.jpg');"></div>
            <div class="rcard-overlay"></div>
            <div class="rcard-label">
                <span class="rcard-type">Ranged Unit</span>
                <span class="rcard-name">Amber Sentinels</span>
            </div>
            <span class="rcard-arrow">&#9654;</span>
        </a>

        <div class="rcard locked-rcard">
            <div class="rcard-img" style="background-image:url('../img/forgotten/forgotten_roster_hybrids.png'); filter:grayscale(1) brightness(0.4);"></div>
            <div class="rcard-overlay"></div>
            <div class="rcard-locked-overlay">&#9632; CLASSIFIED &#9632;</div>
            <div class="rcard-label">
                <span class="rcard-name" style="color:rgba(80,80,80,0.5);">Hybrid Units</span>
            </div>
        </div>

        <a href="../units/forgotten/forgotten_extra.html" class="rcard others-rcard">
            <div class="rcard-img" style="background-image:url('../img/forgotten/forgotten_roster_others.png');"></div>
            <div class="rcard-overlay" style="background:linear-gradient(to top,rgba(3,8,5,0.82) 0%,rgba(3,8,5,0.30) 45%,rgba(0,0,0,0.05) 100%);"></div>
            <div class="rcard-label">
                <span class="rcard-type" style="color:#888;">Miscellaneous</span>
                <span class="rcard-name" style="color:rgba(200,200,200,0.7);">Others</span>
            </div>
            <span class="rcard-arrow" style="color:#888;">&#9654;</span>
        </a>

    </div>
    <a href="forgotten.html" class="back-link">← Return to the Forgotten Overview</a>
</main>

<script>
    document.querySelectorAll('.rcard:not(.locked-rcard)').forEach(card => {
        card.addEventListener('click', e => {
            e.preventDefault();
            const href = card.getAttribute('href');
            if (!href) return;
            const flash = document.createElement('div');
            flash.className = 'flash';
            document.body.appendChild(flash);
            setTimeout(() => { window.location.href = href; }, 130);
        });
    });
</script>
<script src="../system/navigation.js"></script>
</body>
</html>
