<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOULSPECTRE | Fazioni</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #bg-image {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-image: url('../img/homepage_bg.jpg'); 
            background-size: cover;
            background-position: center;
            z-index: -2;
        }

        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: linear-gradient(135deg, rgba(10,10,15,0.95) 0%, rgba(5,5,5,0.98) 100%); 
            z-index: -1;
        }

        header {
            padding: 60px 20px;
            text-align: center;
            width: 100%;
        }

        h1 {
            letter-spacing: 6px;
            font-size: 2.5rem;
            color: #fff;
            text-transform: uppercase;
            margin: 0;
        }

        main {
            display: flex;
            width: 90%;
            max-width: 1200px;
            gap: 40px;
            margin-bottom: 50px;
            align-items: flex-start;
        }

        /* LISTA FAZIONI */
        .faction-list {
            flex: 0 0 40%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .faction-btn {
            background: rgba(20, 20, 25, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            color: #fff;
            text-decoration: none;
            font-size: 1.4rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            border-left: 0px solid transparent;
        }

        .faction-btn:hover {
            background: rgba(30, 30, 45, 1);
            transform: translateX(10px);
        }

        .faction-btn.valkyrion:hover { border-left: 8px solid #5c9ce6; color: #5c9ce6; border-color: rgba(92, 156, 230, 0.4); }
        .faction-btn.forgotten:hover { border-left: 8px solid #a0a0a0; color: #a0a0a0; border-color: rgba(160, 160, 160, 0.4); }

        /* PREVIEW PANEL */
        .preview-panel {
            flex: 1;
            background: rgba(15, 15, 15, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.05);
            min-height: 550px;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border-radius: 4px;
            overflow: hidden;
        }

        #preview-img {
            width: 100%;
            height: 320px;
            object-fit: cover;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            background-color: #000;
        }

        .preview-content { padding: 35px; }

        #preview-title {
            font-size: 2rem;
            margin: 0 0 15px 0;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        #preview-desc {
            color: #ccc;
            font-size: 1.1rem;
            line-height: 1.8;
            margin: 0;
        }

        .placeholder-text {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 550px;
            color: #444;
            font-style: italic;
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .back-link {
            margin: 40px 0;
            color: #666;
            text-decoration: none;
            transition: color 0.3s;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        .back-link:hover { color: #fff; }

        @media (max-width: 900px) {
            main { flex-direction: column; }
            .faction-list, .preview-panel { flex: 1 1 100%; width: 100%; position: static; }
            .preview-panel { min-height: auto; }
        }
    </style>
</head>
<body>

<div id="bg-image"></div>
<div id="overlay"></div>

<header>
    <h1>Factions Archive</h1>
</header>

<main>
    <div class="faction-list">
        <a href="valkyrion.html" class="faction-btn valkyrion" 
           onmouseover="updatePreview('valkyrion')" 
           onmouseout="resetPreview()">
            Valkyrion Empire
        </a>

        <a href="forgotten.html" class="faction-btn forgotten" 
           onmouseover="updatePreview('forgotten')" 
           onmouseout="resetPreview()">
            The Forgotten
        </a>
    </div>

    <div class="preview-panel" id="panel">
        <div id="default-content" class="placeholder-text">
            Seleziona un'entità per avviare la scansione dei dati...
        </div>
        <div id="active-content" style="display: none;">
            <img id="preview-img" src="" alt="Faction Preview">
            <div class="preview-content">
                <h2 id="preview-title"></h2>
                <p id="preview-desc"></p>
            </div>
        </div>
    </div>
</main>

<a href="../index.html" class="back-link">← Return to Main Hub</a>

<script>
    const data = {
        valkyrion: {
            title: "Valkyrion Empire",
            desc: "Un'egemonia d'acciaio e intelletto. Hanno compreso che la sopravvivenza non ammette errori morali. La loro dottrina si basa sulla preveggenza tattica e sulla neutralizzazione sistematica delle minacce tramite arti arcane e precisione militare.",
            img: "../img/faction_preview_valkyrion.jpg"
        },
        forgotten: {
            title: "The Forgotten",
            desc: "Anomalie sistematiche provenienti da un passato cancellato. Entità che manipolano il tempo e il decadimento, operando fuori dalla logica convenzionale. Se i Valkyrion sono la Ragione, i Forgotten sono il Vuoto che attende di divorarla.",
            img: "../img/faction_preview_forgotten.jpg"
        }
    };

    const defaultContent = document.getElementById('default-content');
    const activeContent = document.getElementById('active-content');
    const pTitle = document.getElementById('preview-title');
    const pDesc = document.getElementById('preview-desc');
    const pImg = document.getElementById('preview-img');

    function updatePreview(faction) {
        const info = data[faction];
        pTitle.innerText = info.title;
        pDesc.innerText = info.desc;
        pImg.src = info.img;
        
        defaultContent.style.display = 'none';
        activeContent.style.display = 'block';
    }

    function resetPreview() {
        // Lasciamo l'ultima fazione visualizzata per una navigazione più fluida
    }
</script>

</body>
</html>
