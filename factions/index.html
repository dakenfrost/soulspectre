<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOULSPECTRE | Factions Archive</title>
    <style>
        :root {
            --accent-blue: #5c9ce6;
            --accent-green: #5cb88a;
            --bg-dark: #050505;
            --panel-bg: rgba(10, 10, 12, 0.98);
            --text-main: #e0e0e0;
            --text-locked: #777;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #bg-image {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-image: url('../img/homepage_bg.jpg'); 
            background-size: cover;
            background-position: center;
            z-index: -2;
            filter: brightness(0.15) blur(2px);
        }

        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: radial-gradient(circle, rgba(10,10,15,0.9) 0%, rgba(5,5,5,1) 100%); 
            z-index: -1;
        }

        header {
            padding: 60px 20px;
            text-align: center;
            width: 100%;
        }

        h1 {
            letter-spacing: 8px;
            font-size: 2.5rem;
            color: #fff;
            text-transform: uppercase;
            margin: 0;
            text-shadow: 0 0 20px rgba(92, 156, 230, 0.3);
        }

        main {
            display: flex;
            width: 90%;
            max-width: 1300px;
            gap: 40px;
            margin-bottom: 80px;
            align-items: flex-start;
        }

        .faction-list {
            flex: 0 0 40%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .faction-btn {
            position: relative;
            height: 90px;
            display: flex;
            align-items: center;
            padding-left: 30px;
            color: #fff;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background-size: cover;
            background-position: center;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            z-index: 1;

            /* FIX: Forza l'immagine a non andare oltre il bordo interno */
            background-origin: border-box;
            box-sizing: border-box;
        }

        /* 2. Sostituisci i border-left degli hover con i box-shadow */
        .valkyrion:not(.locked):hover { 
        box-shadow: inset 10px 0 0 0 var(--accent-blue); /* La barra blu ora è "dentro" */
        color: var(--accent-blue); 
        }

        .forgotten:not(.locked):hover { 
        box-shadow: inset 10px 0 0 0 var(--accent-green); 
        color: var(--accent-green); 
        }

        .faction-btn::before {
        content: '';
        position: absolute;
        top: 0; left: 0; 
        width: 100%; height: 100%;
        /* Aumentiamo leggermente l'opacità a sinistra per fondere meglio */
        background: linear-gradient(90deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 100%);
        z-index: -1;
        transition: background 0.3s ease;
        }

        /* Banner Backgrounds */
        .valkyrion { background-image: url('../img/banners/banner_valkyrion.png'); }
        .forgotten { background-image: url('../img/banners/banner_forgotten.png'); }
        .kharos { background-image: url('../img/banners/banner_kharos.jpg'); }
        .syndicate { background-image: url('../img/banners/banner_syndicate.jpg'); }
        .primal { background-image: url('../img/banners/banner_primal.jpg'); }
        .brotherhood { background-image: url('../img/banners/banner_brotherhood.jpg'); }
        .elven { background-image: url('../img/banners/banner_elven.jpg'); }

        /* Hover States for ALL Factions (Active & Locked) */
        .faction-btn:hover {
            transform: translateX(15px);
            border-color: rgba(255,255,255,0.4);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Color Borders only for Active or Highlighted items */
        .valkyrion:hover { border-left: 10px solid var(--accent-blue); color: var(--accent-blue); }
        .forgotten:hover { border-left: 10px solid var(--accent-green); color: var(--accent-green); }
        
        /* Locked hover visuals (No specific color, just white/gray) */
        .locked:hover { border-left: 10px solid #444; color: #fff; }

        /* LOCKED STATE STYLING */
        .locked {
            filter: grayscale(100%);
            opacity: 0.7;
            cursor: help; /* Indica che puoi passarci sopra per info, ma non cliccare */
            color: var(--text-locked);
        }

        .locked::after {
            content: 'DATA LOCKED';
            position: absolute;
            right: 20px;
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: #444;
            border: 1px solid #444;
            padding: 2px 8px;
        }

        /* PREVIEW PANEL */
        .preview-panel {
            flex: 1;
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            min-height: 650px;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9);
            border-radius: 2px;
            overflow: hidden;
        }

        #preview-img {
            width: 100%;
            height: 380px;
            object-fit: cover;
            border-bottom: 2px solid rgba(255,255,255,0.05);
            filter: brightness(0.8);
            transition: opacity 0.3s ease;
        }

        .preview-content { padding: 40px; }
        #preview-title { font-size: 2.2rem; margin: 0 0 20px 0; color: #fff; text-transform: uppercase; letter-spacing: 4px; }
        #preview-desc { color: #bbb; font-size: 1.1rem; line-height: 1.9; margin: 0; }

        .placeholder-text {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 650px;
            color: #333;
            font-style: italic;
            text-align: center;
            padding: 40px;
            font-size: 1.3rem;
            letter-spacing: 2px;
        }

        .back-link { margin: 40px 0; color: #555; text-decoration: none; transition: color 0.3s; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 3px; }
        .back-link:hover { color: #fff; }
    </style>
</head>
<body>

<div id="bg-image"></div>
<div id="overlay"></div>

<header>
    <h1>The Factions Archive</h1>
</header>

<main>
    <div class="faction-list">
        <a href="valkyrion.html" class="faction-btn valkyrion" onmouseover="updatePreview('valkyrion')">Valkyrion Empire</a>
        <a href="forgotten.html" class="faction-btn forgotten" onmouseover="updatePreview('forgotten')">The Forgotten</a>
        
        <a href="javascript:void(0)" class="faction-btn kharos locked" onmouseover="updatePreview('kharos')">Kharos Dominion</a>
        <a href="javascript:void(0)" class="faction-btn syndicate locked" onmouseover="updatePreview('syndicate')">Devil Syndicate</a>
        <a href="javascript:void(0)" class="faction-btn primal locked" onmouseover="updatePreview('primal')">Primal Coalition</a>
        <a href="javascript:void(0)" class="faction-btn brotherhood locked" onmouseover="updatePreview('brotherhood')">Iron Brotherhood</a>
        <a href="javascript:void(0)" class="faction-btn elven locked" onmouseover="updatePreview('elven')">Elven Enclave</a>
    </div>

    <div class="preview-panel">
        <div id="default-content" class="placeholder-text">
            Select an entity to initiate data scan...
        </div>
        <div id="active-content" style="display: none;">
            <img id="preview-img" src="" alt="Faction Preview">
            <div class="preview-content">
                <h2 id="preview-title"></h2>
                <p id="preview-desc"></p>
            </div>
        </div>
    </div>
</main>

<a href="../index.html" class="back-link">← Return to Main Hub</a>

<script>
    const data = {
        valkyrion: {
            title: "Valkyrion Empire",
            desc: "A hegemony of steel and intellect. They understand that survival permits no moral errors. Their doctrine relies on tactical foresight and military precision.",
            img: "../img/faction_preview_valkyrion.jpg"
        },
        forgotten: {
            title: "The Forgotten",
            desc: "An empire born from extinction. Malicott, the Root Mother, preserved entire peoples from total annihilation and gave them a second life.",
            img: "../img/forgotten/faction_preview_forgotten.jpg"
        },
        kharos: {
            title: "Kharos Dominion [LOCKED]",
            desc: "A five-century meritocracy. They blend brutal barbarian warfare with forbidden necromancy and advanced alchemy. Might makes Justice.",
            img: "../img/faction_preview_kharos.jpg"
        },
        syndicate: {
            title: "Devil Syndicate [LOCKED]",
            desc: "A Lawful Evil conglomerate where profit is the only absolute. They conquer territories through economic strangulation and debt.",
            img: "../img/faction_preview_syndicate.jpg"
        },
        primal: {
            title: "Primal Coalition [LOCKED]",
            desc: "A Chaotic Neutral alliance dedicated to the purity of instinct. They reject the suffocating laws of civilized kingdoms.",
            img: "../img/faction_preview_primal.jpg"
        },
        brotherhood: {
            title: "Iron Brotherhood [LOCKED]",
            desc: "A Lawful Neutral collective of dwarves. In this society, individual ambition is a flaw; every citizen is a link in a grand chain.",
            img: "../img/faction_preview_brotherhood.jpg"
        },
        elven: {
            title: "Elven Enclave [LOCKED]",
            desc: "A True Neutral isolationist power. Driven by an unwavering belief in their racial supremacy, indifferent to external chaos.",
            img: "../img/faction_preview_elven.jpg"
        }
    };

    const defaultContent = document.getElementById('default-content');
    const activeContent = document.getElementById('active-content');
    const pTitle = document.getElementById('preview-title');
    const pDesc = document.getElementById('preview-desc');
    const pImg = document.getElementById('preview-img');

    function updatePreview(faction) {
        const info = data[faction];
        if(!info) return;
        pTitle.innerText = info.title;
        pDesc.innerText = info.desc;
        pImg.src = info.img;
        defaultContent.style.display = 'none';
        activeContent.style.display = 'block';
    }
</script>

</body>
</html>
