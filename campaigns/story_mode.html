<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOULSPECTRE | Tactical Map - Story Mode</title>
    <link rel="stylesheet" href="../system/global_nav.css">
    <style>
        :root {
            --panel-bg: rgba(5, 5, 7, 0.98);
            --accent-blue: #5c9ce6;
            --text-gray: #bbb;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100vh;
            background-color: #000;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* --- LAYOUT PRINCIPALE --- */
        .war-room {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        /* --- COLONNA SINISTRA: MAPPA --- */
        .map-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #050505;
            border-right: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            position: relative;
        }

        .map-wrapper {
            position: relative;
            width: 100%;
            max-height: 100vh;
            max-width: calc(100vh * (16 / 9));
            aspect-ratio: 16 / 9;
            background-image: url('../img/world_map_draft.png');
            background-size: cover;
            background-position: center;
            margin: 0 auto;
        }

        /* --- PUNTI INTERATTIVI E TESTI --- */
        .poi {
            position: absolute;
            cursor: pointer;
            transform: translate(-50%, -50%);
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
            transition: transform 0.2s ease;
        }

        .poi-name {
            font-family: 'Segoe UI', sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.75rem;
            color: #fff;
            background: rgba(0, 0, 0, 0.7);
            padding: 6px 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            text-shadow: 0 0 5px #000;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .poi:hover {
            transform: translate(-50%, -50%) scale(1.1);
        }

        .poi:hover .poi-name {
            background: rgba(255, 255, 255, 0.1);
            border-color: #fff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

       /* --- COORDINATE TATTICHE RICALIBRATE --- */
        .pos-elven       { top: 55%; left: 12%; } /* Centro dell'isola a ovest */
        .pos-valkyrion   { top: 72%; left: 26%; } /* Sopra la cittadella fortificata */
        .pos-kharos      { top: 35%; left: 28%; } /* Centro delle rovine nelle pianure */
        .pos-brotherhood { top: 15%; left: 50%; } /* Catena montuosa innevata a nord */
        .pos-devil       { top: 42%; left: 55%; } /* Centro del cratere vulcanico */
        .pos-primal      { top: 68%; left: 45%; } /* Tra i laghi e i boschi a sud */
        .pos-forgotten   { top: 32%; left: 82%; } /* Cuore della foresta magica a est */
        
        .pos-classified  { top: 75%; left: 82%; opacity: 0; pointer-events: none; }

        /* --- COLONNA DESTRA: PANNELLO INTELLIGENCE --- */
        .intel-panel {
            width: 450px;
            background: var(--panel-bg);
            display: flex;
            flex-direction: column;
            box-shadow: -20px 0 50px rgba(0,0,0,0.8);
            z-index: 100;
        }

        .video-container {
            width: 100%;
            height: 300px;
            background: #000;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            position: relative;
        }

        #intel-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .intel-body {
            padding: 40px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        #intel-title {
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin: 0 0 20px 0;
            color: #fff;
        }

        #intel-desc {
            font-size: 1.05rem;
            line-height: 1.8;
            color: var(--text-gray);
            margin-bottom: 40px;
        }

        .deploy-btn {
            margin-top: auto;
            padding: 18px;
            border: 1px solid #fff;
            background: transparent;
            color: #fff;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 3px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            text-decoration: none;
            display: none; 
        }

        .deploy-btn:hover {
            background: #fff;
            color: #000;
        }

        .abort-link {
            position: absolute;
            bottom: 30px;
            left: 30px;
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            z-index: 20;
        }
        .abort-link:hover { color: #fff; }
    </style>
</head>
<body>

<global-navigation base="../"></global-navigation>

<div class="war-room">
    <!-- MAPPA INTERATTIVA -->
    <main class="map-section">
        <div class="map-wrapper">
            
            <div class="poi pos-valkyrion" onmouseenter="updateIntel('valkyrion')">
                <div class="poi-name">Valkyrion Empire</div>
            </div>
            
            <div class="poi pos-kharos" onmouseenter="updateIntel('kharos')">
                <div class="poi-name">Kharos Dominion</div>
            </div>
            
            <div class="poi pos-elven" onmouseenter="updateIntel('elven')">
                <div class="poi-name">Elven Enclave</div>
            </div>
            
            <div class="poi pos-primal" onmouseenter="updateIntel('primal')">
                <div class="poi-name">Primal Coalition</div>
            </div>
            
            <div class="poi pos-devil" onmouseenter="updateIntel('syndicate')">
                <div class="poi-name">Devil Syndicate</div>
            </div>
            
            <div class="poi pos-brotherhood" onmouseenter="updateIntel('brotherhood')">
                <div class="poi-name">Iron Brotherhood</div>
            </div>
            
            <div class="poi pos-forgotten" onmouseenter="updateIntel('forgotten')">
                <div class="poi-name">The Forgotten</div>
            </div>
            
            <div class="poi pos-classified">
                <div class="poi-name">Classified</div>
            </div>

        </div>
        
        <a href="campaign_menu.html" class="abort-link">← Abort Deployment</a>
    </main>

    <!-- PANNELLO INTELLIGENCE -->
    <aside class="intel-panel">
        <div class="video-container">
            <video id="intel-video" muted loop playsinline></video>
        </div>
        <div class="intel-body">
            <h2 id="intel-title">Awaiting Input</h2>
            <p id="intel-desc">Select a region on the tactical map to scan territorial data and available bloodlines.</p>
            <a href="javascript:void(0)" id="deploy-action" class="deploy-btn">Initiate Deployment</a>
        </div>
    </aside>
</div>

<script>
    const factionData = {
        valkyrion: {
            title: "Valkyrion Empire",
            desc: "A hegemony of steel and intellect. Their doctrine relies on tactical foresight and military precision. Enforce order across the continent.",
            video: "../assets/video/faction_valkyrion.mp4",
            link: "start_valkyrion.html",
            btnLabel: "Deploy Forces"
        },
        kharos: {
            title: "Kharos Dominion",
            desc: "A meritocracy blending brutal barbarian warfare with forbidden necromancy and advanced alchemy. Might makes Justice.",
            video: "../assets/video/faction_kharos.mp4",
            link: "start_kharos.html",
            btnLabel: "Conquer All"
        },
        elven: {
            title: "Elven Enclave",
            desc: "Isolationist power driven by racial supremacy. They remain indifferent to external chaos, guarding their ancient borders.",
            video: "../assets/video/faction_elven.mp4",
            link: "start_elven.html",
            btnLabel: "Guard Purity"
        },
        primal: {
            title: "Primal Coalition",
            desc: "An alliance dedicated to the purity of instinct. They reject the suffocating laws of civilized kingdoms for the truth of the wild.",
            video: "../assets/video/faction_primal.mp4",
            link: "start_primal.html",
            btnLabel: "Release Instinct"
        },
        syndicate: {
            title: "Devil Syndicate",
            desc: "A conglomerate where profit is the only absolute. Conquering territories through economic strangulation and debt.",
            video: "../assets/video/faction_syndicate.mp4",
            link: "start_syndicate.html",
            btnLabel: "Buy History"
        },
        brotherhood: {
            title: "Iron Brotherhood",
            desc: "A Lawful Neutral collective. Individual ambition is a flaw; every citizen is a link in a grand, unbreakable chain of industry.",
            video: "../assets/video/faction_brotherhood.mp4",
            link: "start_brotherhood.html",
            btnLabel: "Strengthen Chain"
        },
        forgotten: {
            title: "The Forgotten",
            desc: "An empire born from extinction. Malicott, the Root Mother, preserved entire peoples and gave them a second life in the shadows.",
            video: "../assets/video/faction_forgotten.mp4",
            link: "start_forgotten.html",
            btnLabel: "Rise Again"
        }
    };

    function updateIntel(key) {
        const data = factionData[key];
        if (!data) return;

        const video = document.getElementById('intel-video');
        const title = document.getElementById('intel-title');
        const desc = document.getElementById('intel-desc');
        const btn = document.getElementById('deploy-action');

        title.innerText = data.title;
        desc.innerText = data.desc;
        btn.innerText = data.btnLabel;

        video.style.opacity = '0';
        setTimeout(() => {
            video.src = data.video;
            video.play().catch(e => console.warn("Autoplay blocked:", e));
            video.style.opacity = '1';
        }, 150);

        btn.style.display = 'block';
        btn.href = data.link;
    }
</script>

</body>
</html>
